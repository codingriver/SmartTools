    function genId(prefix) {

    // 渲染四级（始终展开，不可折叠）
    function renderLevel4(level4) {
      return `<div class="level4-content">
        ${level4.title ? ('<b>' + level4.title + '</b>') : ''}${level4.content || ''}
      </div>`;
    }

    // 渲染三级（始终展开，不可折叠）
    function renderLevel3(level3) {
      let html = '';
      if (level3.title) {
        html += `<div class="level3-title">${level3.title}</div>`;
      }
      html += `<div class="level3-content">`;
      if (level3.children && level3.children.length) {
        html += level3.children.map(renderLevel4).join('');
        if (level3.relate) html += `<div class="relate">主要关联知识点：${level3.relate}</div>`;
        if (level3.clinic) html += `<div class="clinic">${level3.clinic}</div>`;
      } else {
        html += (level3.content || '');
        if (level3.relate) html += `<div class="relate">主要关联知识点：${level3.relate}</div>`;
        if (level3.clinic) html += `<div class="clinic">${level3.clinic}</div>`;
      }
      html += `</div>`;
      return `<div class="level3 always-expanded">${html}</div>`;
    }

    // 渲染二级（始终展开，不可折叠）
    function renderLevel2(level2) {
      let html = '';
      if (level2.title) {
        html += `<div class="level2-title">${level2.title}</div>`;
      }
      html += `<div class="level2-content">`;
      if (level2.children && level2.children.length) {
        html += level2.children.map(renderLevel3).join('');
      } else if (level2.content) {
        html += level2.content;
      }
      html += '</div>';
      return `<div class="level2 always-expanded">${html}</div>`;
    }

// 渲染单个章节
function renderChapter(chapter, idx) {
  const id = 'chapter-'+idx;
  // 默认1-2章展开，3-12章收起
  let expanded = chapterExpandState[id];
  if (expanded === undefined) expanded = (idx < 2);
  // 所有章节都可以点击标题展开/收起
  let html = `<section class="chapter${expanded ? " expanded" : " collapsed"}" id="${id}">`;
  html += `<div class="chapter-title" onclick="toggleChapter('${id}')">`;
  html += `<span class="toggle-arrow">${expanded ? "▶" : "▶"}</span>${chapter.title}</div>`;
  html += `<div class="chapter-content" style="display:${expanded?'block':'none'};">`;
  if (chapter.levels && chapter.levels.length) {
    html += chapter.levels.map(renderLevel2).join('');
  }
  html += '</div></section>';
  return html;
}

    // 渲染所有章节
    function renderAllChapters() {
      const main = document.getElementById('mainContent');
      main.innerHTML = data.chapters.map((ch, idx) => renderChapter(ch, idx)).join('');
      // 插入提示
      const tip = document.createElement('div');
      tip.className = 'expand-tip';
      tip.innerHTML = '以下章节请点击展开';
      main.insertBefore(tip, main.children[2]);
    }

    // 章节展开/收起（仅限3-12章）
    window.toggleChapter = function(id) {
      chapterExpandState[id] = !chapterExpandState[id];
      renderAllChapters();
    };

    // 首次渲染
    renderAllChapters();
function goBack() {
