<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾SmartTools-自用小工具集</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' x='-0.11em' font-size='90'>😺🐾</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 15px;
            transition: max-width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .title {
            color: white;
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 8px;
            letter-spacing: 1px;
            transition: font-size 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .title .highlight {
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .title .smart {
            color: white;
            background: linear-gradient(45deg, #fff, #e8f4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @supports (background-clip: text) or (-webkit-background-clip: text) {
            .title .smart {
                color: transparent;
            }
        }

        .title .tools {
            color: white;
            background: linear-gradient(45deg, #fff, #f0f8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @supports (background-clip: text) or (-webkit-background-clip: text) {
            .title .tools {
                color: transparent;
            }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .nav-cards {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
            transition: gap 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            text-decoration: none;
            border-radius: 18px;
            padding: 16px 24px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            min-width: 140px;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .nav-card:hover::before {
            left: 100%;
        }

        .nav-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            transition: gap 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card-container {
            position: relative;
            overflow: visible;
            z-index: 1;
        }

        .card-container.expanded {
            z-index: 20;
        }

        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease,
                       padding 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                       border-radius 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            cursor: pointer;
            overflow: visible;
            z-index: 1;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        .tool-card.math-card {
            cursor: pointer;
            position: relative;
        }

        .expand-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            color: #999;
            transition: transform 0.3s ease;
        }

        .card-container.expanded .expand-indicator {
            transform: rotate(180deg);
        }

        /* 更快的动画速度 */
        .floating-sub-cards {
            position: absolute;
            top: 70%;
            left: 5%;
            right: 5%;
            width: 90%;
            z-index: 100;
            max-height: 0;
            overflow: hidden;
            transform-origin: top center;
            transform: scaleY(0);
            transition: max-height 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55),
                       transform 0.2s cubic-bezier(0.68, -0.5, 0.291, 1.4);
        }

        .floating-sub-cards.show {
            max-height: 200px;
            transform: scaleY(1);
        }

        /* 修复容器底部圆角问题 - 改用上下不同的内边距 */
        .sub-cards-wrapper {
            background: rgba(113, 137, 245, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 12px 0 12px; /* 上左右12px，下0px */
            border: 2px solid rgba(200, 210, 220, 0.3);
            will-change: auto;
            overflow: hidden;
        }

        .sub-card {
            background: rgba(240, 242, 247, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(180, 190, 200, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            cursor: pointer;
            position: relative;
            z-index: 1;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 52px;
        }

        /* 最后一个卡片保持底部间距，这样就正好填满容器 */
        .sub-card:last-child {
            margin-bottom: 12px; /* 恢复底部间距，正好填满容器的高度 */
        }

        .sub-card:hover {
            background: rgba(240, 242, 247, 0.95);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15), 
                    0 0 15px rgba(113, 137, 245, 0.5),
                    0 0 30px rgba(113, 137, 245, 0.2),
                    inset 0 1px 3px rgba(255, 255, 255, 0.5);
            z-index: 2;
        }

        .sub-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .sub-card-desc {
            font-size: 12px;
            color: #666;
        }

        .tool-icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
            transition: font-size 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                       margin-bottom 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .tool-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            line-height: 1.3;
            transition: font-size 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                       margin-bottom 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .tool-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            transition: font-size 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        /* 响应式布局 */
        @media (max-width: 320px) {
            .container {
                padding-top: 10px;
            }
            
            .title {
                font-size: 24px;
            }
            
            .tool-card {
                padding: 15px;
            }

            .header {
                margin-bottom: 10px;
            }

            .footer {
                margin-top: 10px;
            }

            .nav-cards {
                gap: 8px;
                margin-bottom: 18px;
            }

            .nav-card {
                min-width: 110px;
                padding: 10px 18px;
                font-size: 13px;
            }

            .tool-icon {
                font-size: 23px;
                margin-bottom: 8px;
            }

            .tool-title {
                font-size: 14px;
                margin-bottom: 5px;
            }

            .tool-desc {
                font-size: 12px;
            }

            .tools-grid {
                gap: 12px;
                grid-template-columns: 1fr;
            }

            .floating-sub-cards {
                top: 75%;
                left: 7.5%;
                right: 7.5%;
                width: 85%;
            }

            .floating-sub-cards.show {
                max-height: 160px;
            }

            /* 小屏幕也应用相同的修复 */
            .sub-cards-wrapper {
                padding: 10px 10px 0 10px; /* 小屏幕：上左右10px，下0px */
            }

            .sub-card {
                padding: 10px 16px;
                margin-bottom: 6px;
                min-height: 48px;
            }

            .sub-card:last-child {
                margin-bottom: 10px; /* 小屏幕：最后一个卡片底部间距10px */
            }

            .sub-card-title {
                font-size: 13px;
            }

            .sub-card-desc {
                font-size: 11px;
            }
        }

        @media (min-width: 321px) and (max-width: 799px) {
            .container {
                max-width: 600px;
            }

            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .nav-cards {
                gap: 15px;
            }

            .nav-card {
                min-width: 143px;
                padding: 13px 23px;
                font-size: 15px;
            }
        }

        @media (min-width: 800px) and (max-width: 1199px) {
            .container {
                max-width: 800px;
            }

            .tools-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }

            .nav-cards {
                gap: 20px;
            }

            .nav-card {
                min-width: 175px;
                padding: 18px 28px;
                font-size: 16px;
            }

            .tool-card {
                padding: 22px;
            }

            .tool-icon {
                font-size: 30px;
            }

            .tool-title {
                font-size: 17px;
            }

            .tool-desc {
                font-size: 14px;
            }
        }

        @media (min-width: 1200px) {
            .container {
                max-width: 1200px;
            }

            .tools-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
            }

            .nav-cards {
                gap: 24px;
            }

            .nav-card {
                min-width: 220px;
                padding: 20px 33px;
                font-size: 17px;
            }

            .tool-card {
                padding: 24px;
                border-radius: 18px;
            }

            .tool-icon {
                font-size: 32px;
                margin-bottom: 12px;
            }

            .tool-title {
                font-size: 18px;
                margin-bottom: 8px;
            }

            .tool-desc {
                font-size: 15px;
            }

            .title {
                font-size: 32px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .tool-card:active {
                transform: scale(0.98);
                transition: transform 0.1s ease;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">
                <span class="smart"><span class="highlight">S</span><b>mart</b></span><span class="tools"><span class="highlight">T</span><b>ools</b></span>
            </h1>
            <p class="subtitle">实用小工具集合</p>
            
            <div class="nav-cards">
                <a href="about.html" class="nav-card">📄 简介</a>
                <a href="index.html" class="nav-card">🔖 收藏夹</a>
            </div>
        </div>

        <div class="tools-grid">
            <a href="tools/ydyjsq.html" class="tool-card">
                <span class="tool-icon">🧮</span>
                <h3 class="tool-title">估算计算器</h3>
                <p class="tool-desc">可以进行拟人估算计算</p>
            </a>

            <div class="card-container">
                <div class="tool-card math-card" onclick="toggleMathCard(this)">
                    <span class="tool-icon">📚</span>
                    <h3 class="tool-title">口算练习</h3>
                    <p class="tool-desc">生成每日口算练习题目</p>
                    <span class="expand-indicator">▼</span>
                </div>
                
                <div class="floating-sub-cards">
                    <div class="sub-cards-wrapper">
                        <div class="sub-card" onclick="window.location.href='tools/math3-4.html'">
                            <div class="sub-card-title">三转四年级</div>
                            <div class="sub-card-desc">升学过渡练习</div>
                        </div>
                        <div class="sub-card" onclick="window.location.href='tools/math3.html'">
                            <div class="sub-card-title">三年级(下)</div>
                            <div class="sub-card-desc">下学期练习题</div>
                        </div>
                    </div>
                </div>
            </div>

            <a href="tools/9gg3.html" class="tool-card">
                <span class="tool-icon">📜</span>
                <h3 class="tool-title">诗词九宫格</h3>
                <p class="tool-desc">通过九宫格游戏帮助记忆古诗词</p>
            </a>

            <a href="index.html" class="tool-card">
                <span class="tool-icon">🎁</span>
                <h3 class="tool-title">在线收藏夹</h3>
                <p class="tool-desc">常用网站链接收藏</p>
            </a>
            
            <a href="tools/slxzsd.html?from=toolsindex" class="tool-card">
                <span class="tool-icon">🩺</span>
                <h3 class="tool-title">生理知识点</h3>
                <p class="tool-desc">关联临床</p>
            </a>            
        </div>

        <div class="footer">
            <p>m(AT)mrr.cc</p>
        </div>
    </div>

    <script>
        function toggleMathCard(card) {
            const container = card.closest('.card-container');
            const subCards = container.querySelector('.floating-sub-cards');
            const isExpanded = container.classList.contains('expanded');
            
            // 关闭其他已展开的卡片
            document.querySelectorAll('.card-container.expanded').forEach(otherContainer => {
                if (otherContainer !== container) {
                    const otherSubCards = otherContainer.querySelector('.floating-sub-cards');
                    otherContainer.classList.remove('expanded');
                    otherSubCards.classList.remove('show');
                }
            });
            
            if (isExpanded) {
                // 收起
                container.classList.remove('expanded');
                subCards.classList.remove('show');
            } else {
                // 展开
                container.classList.add('expanded');
                subCards.classList.add('show');
            }
        }

        // 点击页面其他地方关闭展开的卡片
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.card-container')) {
                document.querySelectorAll('.card-container.expanded').forEach(container => {
                    const subCards = container.querySelector('.floating-sub-cards');
                    container.classList.remove('expanded');
                    subCards.classList.remove('show');
                });
            }
        });

        // 阻止次级卡片的点击事件冒泡
        document.addEventListener('click', function(e) {
            if (e.target.closest('.floating-sub-cards')) {
                e.stopPropagation();
            }
        });
    </script>
</body>
</html>
