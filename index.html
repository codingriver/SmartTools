<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖在线收藏夹 - 跳转中...</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' x='-0.11em' font-size='90'>😺🏷</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #FAFBFC;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #6B7280;
        }

        .loader {
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .loader .emoji {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
            animation: bounce 1s ease-in-out infinite;
        }

        .loader .text {
            font-size: 14px;
            letter-spacing: 0.02em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        noscript .fallback {
            text-align: center;
            padding: 40px 20px;
        }

        noscript .fallback h2 {
            color: #111827;
            margin-bottom: 20px;
            font-size: 20px;
        }

        noscript .fallback a {
            display: inline-block;
            margin: 6px 8px;
            padding: 10px 22px;
            background: #0D9373;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        noscript .fallback a:hover {
            background: #087F5B;
        }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <span class="emoji">⭐️</span>
        <p class="text">正在跳转收藏夹…</p>
    </div>

    <noscript>
        <div class="fallback">
            <h2>⭐️ 选择收藏夹风格</h2>
            <a href="index1.html">🌌 Nebula</a>
            <a href="index2.html">📄 Notion</a>
            <a href="index3.html">💎 Stripe</a>
            <a href="index4.html">🖤 Framer</a>
            <a href="index5.html">🌿 Mintlify</a>
        </div>
    </noscript>

    <script>
        (function () {
            var DEFAULT_PAGE = 'index1.html';
            var STORAGE_KEY  = 'fav_last_style';

            var target = DEFAULT_PAGE;

            try {
                var saved = localStorage.getItem(STORAGE_KEY);
                // 只允许跳转到合法的风格页面
                var allowed = [
                    'index1.html', 'index2.html', 'index3.html',
                    'index4.html', 'index5.html'
                ];
                if (saved && allowed.indexOf(saved) !== -1) {
                    target = saved;
                }
            } catch (e) {
                // localStorage 不可用时，使用默认页
            }

            window.location.replace(target);
        })();
    </script>

</body>
</html>
