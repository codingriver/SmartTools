    <title>💖在线收藏夹</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' x='-0.11em' font-size='90'>😺🏷</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mt-green: #0D9373;
            --mt-green-light: #10B981;
            --mt-green-dim: #087F5B;
            --mt-green-wash: rgba(13, 147, 115, 0.06);
            --mt-green-wash-s: rgba(13, 147, 115, 0.10);
            --mt-green-wash-m: rgba(13, 147, 115, 0.15);
            --mt-green-border: rgba(13, 147, 115, 0.20);
            --mt-green-border-s: rgba(13, 147, 115, 0.40);

            --mt-bg: #FAFBFC;
            --mt-surface-0: #FFFFFF;
            --mt-surface-1: #F3F4F6;
            --mt-surface-2: #E5E7EB;

            --mt-border: rgba(0, 0, 0, 0.07);
            --mt-border-strong: rgba(0, 0, 0, 0.11);
            --mt-border-hover: rgba(13, 147, 115, 0.25);

            --mt-text-1: #111827;
            --mt-text-2: #6B7280;
            --mt-text-3: #9CA3AF;

            --mt-shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --mt-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);
            --mt-shadow-md: 0 4px 14px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
            --mt-shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.03);

            --mt-radius: 12px;
            --mt-radius-s: 8px;
            --mt-ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--mt-bg);
            color: var(--mt-text-1);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent 2%, #10B981 20%, #0D9373 50%, #10B981 80%, transparent 98%);
            z-index: 9999;
            pointer-events: none;
            opacity: 0.75;
        }

        body::after {
            content: '';
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(13, 147, 115, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 15px;
            transition: max-width 0.4s var(--mt-ease);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            padding-top: 42px;
        }

        .title {
            color: var(--mt-text-1);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.03em;
            transition: font-size 0.4s var(--mt-ease);
        }

        .footer {
            text-align: center;
            margin-top: 1px;
            color: var(--mt-text-3);
            font-size: 12px;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: errorFadeIn 0.6s ease-out;
        }

        @keyframes errorFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-card {
            background: var(--mt-surface-0);
            border: 1px solid var(--mt-border);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: var(--mt-shadow-lg);
        }

        .error-emoji {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: errorBounce 2s ease-in-out infinite;
        }

        @keyframes errorBounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .error-title {
            color: var(--mt-text-1);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .error-message {
            color: var(--mt-text-2);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .error-hint-box {
            background: var(--mt-green-wash);
            border: 1px solid var(--mt-green-border);
            border-radius: var(--mt-radius);
            padding: 16px 18px;
            text-align: left;
            margin-bottom: 24px;
        }

        .error-hint-title {
            color: var(--mt-green);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .error-hint-item {
            color: var(--mt-text-2);
            font-size: 13px;
            line-height: 1.6;
            padding-left: 18px;
            position: relative;
            margin-bottom: 6px;
        }

        .error-hint-item:last-child { margin-bottom: 0; }

        .error-hint-item::before {
            content: '›';
            position: absolute;
            left: 4px;
            color: var(--mt-green);
            font-weight: bold;
        }

        .error-hint-item code {
            background: var(--mt-green-wash-s);
            color: var(--mt-green-dim);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 12px;
        }

        .error-home-btn {
            display: inline-block;
            background: var(--mt-green);
            color: white;
            text-decoration: none;
            border-radius: var(--mt-radius-s);
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s var(--mt-ease);
            border: none;
        }

        .error-home-btn:hover {
            background: var(--mt-green-dim);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(13, 147, 115, 0.25);
        }

        .link-icon {
            display: inline-flex;
            width: 1.2em;
            height: 1.2em;
            vertical-align: -0.125em;
        }

        .link-icon img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .link-icon-svg {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .link-icon-svg svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .back-nav {
            display: flex;
            justify-content: center;
        }

        .back-link {
            background: var(--mt-surface-0);
            border: 1px solid var(--mt-border);
            color: var(--mt-text-2);
            text-decoration: none;
            border-radius: var(--mt-radius-s);
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s var(--mt-ease);
            box-shadow: var(--mt-shadow-xs);
            text-align: center;
            min-width: 120px;
            position: relative;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--mt-green-wash), transparent);
            transition: left 0.5s;
        }

        .back-link:hover::before { left: 100%; }

        .back-link:hover {
            color: var(--mt-green);
            border-color: var(--mt-border-hover);
            transform: translateY(-1px);
            box-shadow: var(--mt-shadow-sm);
        }

        .section {
            margin-bottom: 30px;
            transition: margin-bottom 0.4s var(--mt-ease);
        }

        .section-title {
            color: var(--mt-text-1);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: -0.02em;
            transition: font-size 0.4s var(--mt-ease),
                       margin-bottom 0.4s var(--mt-ease);
        }

        .expand-section-btn {
            background: var(--mt-surface-0);
            border: 1px solid var(--mt-border);
            color: var(--mt-text-2);
            border-radius: var(--mt-radius-s);
            padding: 6px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s var(--mt-ease);
            box-shadow: var(--mt-shadow-xs);
            margin: 15px auto;
            width: 30%;
            min-width: 140px;
            height: 32px;
            opacity: 1;
            transform: translateY(0);
            position: relative;
            overflow: hidden;
            font-family: inherit;
            letter-spacing: -0.01em;
        }

        .expand-section-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--mt-green-wash), transparent);
            transition: left 0.5s;
        }

        .expand-section-btn:hover::before { left: 100%; }

        .expand-section-btn:hover {
            color: var(--mt-green);
            border-color: var(--mt-border-hover);
            transform: translateY(-1px);
            box-shadow: var(--mt-shadow-sm);
        }

        .expand-section-btn .arrow {
            font-size: 11px;
            transition: transform 0.3s ease;
        }

        .expand-section-btn.expanded .arrow { transform: rotate(180deg); }

        .expand-section-btn.moving {
            opacity: 0;
            transform: translateY(-20px);
        }

        #video-collapse-btn { margin-top: 8px; margin-bottom: 15px; }
        #ai-collapse-btn { margin-top: 8px; margin-bottom: 15px; }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            transition: gap 0.4s var(--mt-ease);
            justify-content: center;
            width: 100%;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            transition: gap 0.4s var(--mt-ease);
            justify-content: center;
            width: 100%;
            max-width: none;
            margin: 0 auto;
        }

        .hidden-cards {
            display: none;
            margin-top: 19px;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden-cards.expanded {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            opacity: 1;
            transform: translateY(0);
            transition: gap 0.4s var(--mt-ease);
            justify-content: center;
        }

        .hidden-cards .link-card,
        .hidden-cards .card-container {
            opacity: 0;
            transform: translateY(-20px);
        }

        .hidden-cards .link-card:nth-child(1), .hidden-cards .card-container:nth-child(1),
        .hidden-cards .link-card:nth-child(2), .hidden-cards .card-container:nth-child(2)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 0.1s; }

        .hidden-cards .link-card:nth-child(3), .hidden-cards .card-container:nth-child(3),
        .hidden-cards .link-card:nth-child(4), .hidden-cards .card-container:nth-child(4)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 0.3s; }

        .hidden-cards .link-card:nth-child(5), .hidden-cards .card-container:nth-child(5),
        .hidden-cards .link-card:nth-child(6), .hidden-cards .card-container:nth-child(6)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 0.5s; }

        .hidden-cards .link-card:nth-child(7), .hidden-cards .card-container:nth-child(7),
        .hidden-cards .link-card:nth-child(8), .hidden-cards .card-container:nth-child(8)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 0.7s; }

        .hidden-cards .link-card:nth-child(9), .hidden-cards .card-container:nth-child(9),
        .hidden-cards .link-card:nth-child(10), .hidden-cards .card-container:nth-child(10)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 0.9s; }

        .hidden-cards .link-card:nth-child(11), .hidden-cards .card-container:nth-child(11),
        .hidden-cards .link-card:nth-child(12), .hidden-cards .card-container:nth-child(12)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 1.1s; }

        .hidden-cards .link-card:nth-child(13), .hidden-cards .card-container:nth-child(13),
        .hidden-cards .link-card:nth-child(14), .hidden-cards .card-container:nth-child(14)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 1.3s; }

        .hidden-cards .link-card:nth-child(15), .hidden-cards .card-container:nth-child(15),
        .hidden-cards .link-card:nth-child(16), .hidden-cards .card-container:nth-child(16)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 1.5s; }

        .hidden-cards .link-card:nth-child(17), .hidden-cards .card-container:nth-child(17),
        .hidden-cards .link-card:nth-child(18), .hidden-cards .card-container:nth-child(18)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 1.7s; }

        .hidden-cards .link-card:nth-child(19), .hidden-cards .card-container:nth-child(19),
        .hidden-cards .link-card:nth-child(20), .hidden-cards .card-container:nth-child(20)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 1.9s; }

        .hidden-cards .link-card:nth-child(n+21), .hidden-cards .card-container:nth-child(n+21)
        { animation: slideInDownRowWithHover 0.6s ease forwards; animation-delay: 2.1s; }

        @keyframes slideInDownRowWithHover {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hidden-cards.expanded.hover-ready .link-card {
            animation-name: none !important; opacity: 1 !important; transform: translateY(0) !important;
            transition: transform 0.25s var(--mt-ease), box-shadow 0.25s var(--mt-ease), border-color 0.25s ease !important;
        }
        .hidden-cards.expanded.hover-ready .card-container .link-card {
            animation-name: none !important; opacity: 1 !important; transform: translateY(0) !important;
            transition: transform 0.25s var(--mt-ease), box-shadow 0.25s var(--mt-ease), border-color 0.25s ease !important;
        }
        .hidden-cards.expanded.hover-ready .link-card:hover {
            transform: translateY(-2px) !important; box-shadow: var(--mt-shadow-md) !important;
            border-color: var(--mt-border-hover) !important; z-index: 2 !important;
        }
        .hidden-cards.expanded.hover-ready .card-container .link-card:hover {
            transform: translateY(-2px) !important; box-shadow: var(--mt-shadow-md) !important;
            border-color: var(--mt-border-hover) !important; z-index: 2 !important;
        }

        .hidden-cards.collapsing .link-card, .hidden-cards.collapsing .card-container
        { animation: slideOutUpRow 0.4s ease forwards; }

        .hidden-cards.collapsing .link-card:nth-child(19), .hidden-cards.collapsing .card-container:nth-child(19),
        .hidden-cards.collapsing .link-card:nth-child(20), .hidden-cards.collapsing .card-container:nth-child(20) { animation-delay: 0s; }
        .hidden-cards.collapsing .link-card:nth-child(17), .hidden-cards.collapsing .card-container:nth-child(17),
        .hidden-cards.collapsing .link-card:nth-child(18), .hidden-cards.collapsing .card-container:nth-child(18) { animation-delay: 0.1s; }
        .hidden-cards.collapsing .link-card:nth-child(15), .hidden-cards.collapsing .card-container:nth-child(15),
        .hidden-cards.collapsing .link-card:nth-child(16), .hidden-cards.collapsing .card-container:nth-child(16) { animation-delay: 0.2s; }
        .hidden-cards.collapsing .link-card:nth-child(13), .hidden-cards.collapsing .card-container:nth-child(13),
        .hidden-cards.collapsing .link-card:nth-child(14), .hidden-cards.collapsing .card-container:nth-child(14) { animation-delay: 0.3s; }
        .hidden-cards.collapsing .link-card:nth-child(11), .hidden-cards.collapsing .card-container:nth-child(11),
        .hidden-cards.collapsing .link-card:nth-child(12), .hidden-cards.collapsing .card-container:nth-child(12) { animation-delay: 0.4s; }
        .hidden-cards.collapsing .link-card:nth-child(9), .hidden-cards.collapsing .card-container:nth-child(9),
        .hidden-cards.collapsing .link-card:nth-child(10), .hidden-cards.collapsing .card-container:nth-child(10) { animation-delay: 0.5s; }
        .hidden-cards.collapsing .link-card:nth-child(7), .hidden-cards.collapsing .card-container:nth-child(7),
        .hidden-cards.collapsing .link-card:nth-child(8), .hidden-cards.collapsing .card-container:nth-child(8) { animation-delay: 0.6s; }
        .hidden-cards.collapsing .link-card:nth-child(5), .hidden-cards.collapsing .card-container:nth-child(5),
        .hidden-cards.collapsing .link-card:nth-child(6), .hidden-cards.collapsing .card-container:nth-child(6) { animation-delay: 0.7s; }
        .hidden-cards.collapsing .link-card:nth-child(3), .hidden-cards.collapsing .card-container:nth-child(3),
        .hidden-cards.collapsing .link-card:nth-child(4), .hidden-cards.collapsing .card-container:nth-child(4) { animation-delay: 0.8s; }
        .hidden-cards.collapsing .link-card:nth-child(1), .hidden-cards.collapsing .card-container:nth-child(1),
        .hidden-cards.collapsing .link-card:nth-child(2), .hidden-cards.collapsing .card-container:nth-child(2) { animation-delay: 0.9s; }

        @keyframes slideOutUpRow {
            to { opacity: 0; transform: translateY(-20px); }
        }

        .card-container { position: relative; overflow: visible; z-index: 1; }
        .card-container.active { z-index: 20; }
        .card-container.active > .link-card {
            border-color: var(--mt-green-border-s);
            box-shadow: 0 0 0 3px var(--mt-green-wash-s), var(--mt-shadow-md);
        }
        .hidden-cards .card-container { z-index: 2; }
        .hidden-cards .card-container.active { z-index: 60; }

        .link-card {
            background: var(--mt-surface-0);
            border: 1px solid var(--mt-border);
            border-radius: var(--mt-radius);
            padding: 16px;
            box-shadow: var(--mt-shadow-sm);
            transition: transform 0.25s var(--mt-ease), box-shadow 0.25s var(--mt-ease),
                       border-color 0.25s ease,
                       padding 0.4s var(--mt-ease),
                       border-radius 0.4s var(--mt-ease);
            text-decoration: none;
            color: inherit;
            position: relative;
            cursor: pointer;
            overflow: visible;
            z-index: 1;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--mt-shadow-md);
            border-color: var(--mt-border-hover);
            z-index: 2;
        }

        .link-card::after {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 3px;
            background: var(--mt-green);
            border-radius: 0 3px 3px 0;
            opacity: 0;
            transform: scaleY(0.4);
            transition: opacity 0.25s var(--mt-ease), transform 0.25s var(--mt-ease);
        }

        .link-card:hover::after {
            opacity: 1;
            transform: scaleY(1);
        }

        .link-card-with-expand { padding-right: 42px; }

        .link-card-with-expand::before {
            content: '';
            position: absolute;
            right: 0;
            top: 25%;
            bottom: 25%;
            width: 2.5px;
            background: var(--mt-green);
            border-radius: 3px 0 0 3px;
            opacity: 0.08;
            transition: opacity 0.35s var(--mt-ease),
                        top 0.35s var(--mt-ease),
                        bottom 0.35s var(--mt-ease);
        }

        .link-card-with-expand:hover::before {
            opacity: 0.35;
            top: 15%;
            bottom: 15%;
        }

        .card-container.active > .link-card-with-expand::before {
            opacity: 0.55;
            top: 10%;
            bottom: 10%;
        }

        .link-card-with-expand .expand-zone {
            position: absolute;
            top: 0; right: 0;
            width: 40%; height: 100%;
            border-radius: 0 var(--mt-radius) var(--mt-radius) 0;
            cursor: pointer;
            z-index: 2;
            transition: background 0.25s ease;
        }

        .link-card-with-expand .expand-zone:hover {
            background: var(--mt-green-wash);
        }
        .link-card-with-expand .expand-zone:active {
            background: var(--mt-green-wash-s);
        }

        .email-card {
            position: relative;
            padding: 16px;
            padding-right: 55%;
            overflow: hidden;
        }

        .email-card::after {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 3px;

        /* ================================================================
           风格切换下拉 — 悬浮固定版（与 #backHomeBtn 同透明度/模糊）
           ================================================================ */
        .style-switcher {
            position: fixed;
            top: 28px;
            z-index: 10000;
            min-width: 108px;
        }

        .style-btn {
            width: 100%;
            background: rgba(225, 250, 251, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid var(--mt-border);
            color: var(--mt-text-2);
            border-radius: 8px;
            padding: 7px 11px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
            white-space: nowrap;
            transition: all 0.25s var(--mt-ease);
            box-shadow: var(--mt-shadow-sm);
            font-family: inherit;
            letter-spacing: -0.01em;
        }
        .style-btn:hover {
            border-color: var(--mt-border-hover);
            color: var(--mt-green);
            box-shadow: var(--mt-shadow-md);
        }

        .style-caret {
            font-size: 10px; line-height: 1;
            transition: transform 0.22s ease;
            opacity: 0.5;
        }
        .style-switcher.open .style-caret { transform: rotate(180deg); }

        .style-menu {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0; right: 0;
            background: rgba(225, 250, 251, 0.15);
            backdrop-filter: blur(2px) saturate(1.3);
            -webkit-backdrop-filter: blur(16px) saturate(1.3);
            border: 1px solid var(--mt-border-strong);
            border-radius: 2px;
            overflow: hidden;
            box-shadow: var(--mt-shadow-lg);
            animation: menuFadeIn 0.18s ease;
            border-radius: 8px;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .style-switcher.open .style-menu { display: block; }

        .style-opt {
            display: block;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--mt-text-2);
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
            white-space: nowrap;
            font-family: inherit;
        }
        .style-opt:hover {
            background: var(--mt-green-wash);
            color: var(--mt-green);
        }

        .style-opt-active {
            background: var(--mt-green-wash);
            color: var(--mt-green) !important;
            font-weight: 600;
            cursor: default;
        }
        .style-opt-active:hover { background: var(--mt-green-wash); }

        /* ================================================================
         * 交互增强
         * ================================================================ */

        a, button, [onclick], [role="option"],
        .link-card, .sub-card, .back-link, .expand-section-btn,
        .expand-zone, .email-tab, .style-btn, .style-opt,
        #backHomeBtn, .error-home-btn, .contact-desc,
        .email-contact-desc, .link-desc-clickable {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .link-card,
        .sub-card,
        .back-link,
        .expand-section-btn,
        .style-btn,
        .style-opt,
        .error-home-btn {
            position: relative;
            overflow: hidden;
        }

        #backHomeBtn {
            overflow: hidden;
        }

        .card-container > .link-card {
            overflow: hidden;
        }
        .card-container {
            overflow: visible;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            background-color: #0D9373;
            opacity: 0.35;
        }

        @keyframes ripple-anim {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        .error-home-btn .ripple {
            background-color: #ffffff;
            opacity: 0.45;
        }

        .email-tab .ripple {
            background-color: #087F5B;
            opacity: 0.3;
        }

        .style-opt .ripple {
            background-color: #0D9373;
            opacity: 0.25;
        }

        .link-card,
        .sub-card,
        .back-link,
        .expand-section-btn,
        .style-btn,
        .style-opt,
        .email-tab,
        #backHomeBtn,
        .error-home-btn {
            -webkit-user-select: none;
            user-select: none;
        }

        .email-tab:active {
            filter: none !important;
            transition: none !important;
        }

        .link-card.email-card {
            transform: none;
            transition: transform .18s ease,
                        box-shadow .18s ease,
                        border-color .18s ease,
                        background .18s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .link-card.email-card:hover,
            .link-card.email-card:active,
            .link-card.email-card:hover:active,
            .link-card.email-card:focus {
                transform: translateY(-2px) !important;
            }
        }

        @media (hover: none) {
            .link-card.email-card,
            .link-card.email-card:active,
            .link-card.email-card:focus {
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <button id="backHomeBtn" onclick="window.location.href='toolsindex.html'">← 主页</button>

    <!-- 右上角悬浮风格切换 -->
    <div class="style-switcher" id="styleSwitcher">
        <button class="style-btn" id="styleBtn"
                onclick="toggleStyleMenu(event)"
                aria-haspopup="listbox" aria-expanded="false">
            <span>🌿 Mintlify</span>
            <span class="style-caret">▾</span>
        </button>
        <div class="style-menu" id="styleMenu" role="listbox">
            <a href="index1.html" class="style-opt" role="option">🌌 Nebula</a>
            <a href="index2.html" class="style-opt" role="option">📄 Notion</a>
            <a href="index3.html" class="style-opt" role="option">💎 Stripe</a>
            <a href="index4.html" class="style-opt" role="option">🖤 Framer</a>
            <div class="style-opt style-opt-active" role="option" aria-selected="true">🌿 Mintlify</div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="title">⭐️收藏夹🌹</h1>
            <div class="back-nav">
                <a href="toolsindex.html" class="back-link">← 前往小工具</a>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">☁️ 在线U盘</h2>
            <div id="usb-drive-content"></div>
        </div>

        <div class="section">
            <h2 class="section-title">📚 授课资料</h2>
            <div id="teaching-content"></div>
        </div>

        <div class="section">
            <h2 class="section-title">🖥️ 网络资源</h2>
            <div id="online-ai-content"></div>
        </div>

        <div class="section">
            <h2 class="section-title">🎬 视频聚合</h2>
            <div id="video-content"></div>
        </div>

        <div class="section">
            <h2 class="section-title">📧 联系方式</h2>
            <div id="contact-content"></div>
        </div>

        <div class="footer">
            <p>m(AT)mrr.cc</p>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        try { localStorage.setItem('fav_last_style', 'index5.html'); } catch(e) {}
        if (typeof usbDriveData === 'undefined' || typeof emailData === 'undefined') {
            document.querySelector('.container').innerHTML =
                '<div class="error-container">' +
                    '<div class="error-card">' +
                        '<span class="error-emoji">📂</span>' +
                        '<h2 class="error-title">数据加载失败</h2>' +
                        '<p class="error-message">收藏夹内容未能加载，可能是数据文件缺失或存在语法错误。</p>' +
                        '<div class="error-hint-box">' +
                            '<div class="error-hint-title">排查建议</div>' +
                            '<div class="error-hint-item">确认 <code>数据文件</code> 与本页面在同一目录下</div>' +
                            '<div class="error-hint-item">用浏览器 F12 控制台查看是否有 404 或语法报错</div>' +
                            '<div class="error-hint-item">检查 SVG 图标是否写在同一行，避免模板字符串解析失败</div>' +
                        '</div>' +
                        '<a href="toolsindex.html" class="error-home-btn">← 返回主页</a>' +
                    '</div>' +
                '</div>';
            throw new Error('数据文件 未加载');
        }

        // ================================================================
        // 风格切换下拉菜单
        // ================================================================
        function toggleStyleMenu(event) {
            event.stopPropagation();
            var switcher = document.getElementById('styleSwitcher');
            var btn      = document.getElementById('styleBtn');
            var isOpen   = switcher.classList.toggle('open');
            btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }

        document.addEventListener('click', function(e) {
            var switcher = document.getElementById('styleSwitcher');
            if (switcher && !switcher.contains(e.target)) {
                switcher.classList.remove('open');
                var btn = document.getElementById('styleBtn');
                if (btn) btn.setAttribute('aria-expanded', 'false');
            }
        });

        // ================================================================
        // 风格切换按钮定位 — 右边缘与 .container 齐平
        // ================================================================
        function alignStyleSwitcher() {
            var switcher = document.getElementById('styleSwitcher');
            var container = document.querySelector('.container');
            if (!switcher || !container) return;
            var containerRect = container.getBoundingClientRect();
            var viewportWidth = document.documentElement.clientWidth;
            var rightOffset = Math.max(0, viewportWidth - containerRect.right);
            switcher.style.right = rightOffset + 'px';
        }

        // ================================================================
        // 全局状态
        // ================================================================
        var currentExpanded = null;
        var currentLayout = 'mobile';
        var currentEmailData = emailData[0];
        var isAnimating = false;

        function detectLayout() {
            var w = window.innerWidth;
            if (w <= 480) return 'mobile';
            if (w <= 799) return 'tablet';
            return 'desktop';
        }

        function renderIcon(item, extraAttrs) {
            extraAttrs = extraAttrs || '';
            if (item.iconImg) {
                return '<span class="link-icon" ' + extraAttrs + ' aria-hidden="true"><img src="' + item.iconImg + '" alt="" /></span>';
            }
            var icon = item.icon || '';
            if (icon.charAt(0) === '<') {
                return '<span class="link-icon link-icon-svg" ' + extraAttrs + '>' + icon + '</span>';
            }
            return '<span class="link-icon" ' + extraAttrs + '>' + icon + '</span>';
        }

        function generateCardHTML(card) {
            if (card.type === 'simple') {
                return '<a href="' + card.url + '" target="_blank" class="link-card">' +
                    renderIcon(card) +
                    '<h3 class="link-title">' + card.title + '</h3>' +
                    '<p class="link-desc">' + (card.desc || '') + '</p></a>';
            }
            if (card.type === 'desc-clickable') {
                return '<div class="link-card" onclick="window.open(\'' + card.url + '\', \'_blank\')">' +
                    renderIcon(card) +
                    '<h3 class="link-title">' + card.title + '</h3>' +
                    '<p class="link-desc-clickable" onclick="event.stopPropagation(); window.open(\'' + card.descUrl + '\', \'_blank\')">' + card.descClickable + '</p></div>';
            }
            if (card.type === 'expandable') {
                var descHTML = '';
                if (card.descClickable) {
                    descHTML = '<p class="link-desc-clickable" onclick="event.stopPropagation(); window.open(\'' + card.descUrl + '\', \'_blank\')">' + card.descClickable + '</p>';
                } else if (card.desc) {
                    descHTML = '<p class="link-desc">' + card.desc + '</p>';
                }
                var subHTML = '';
                card.subCards.forEach(function(sc) { subHTML += generateSubCardHTML(sc); });
                return '<div class="card-container">' +
                    '<div class="link-card link-card-with-expand" onclick="handleCardClick(event, \'' + card.url + '\', \'' + card.id + '-subcards\')">' +
                    renderIcon(card) +
                    '<h3 class="link-title">' + card.title + '</h3>' +
                    descHTML +
                    '<div class="expand-zone" onclick="event.stopPropagation(); handleExpandZone(\'' + card.id + '-subcards\', this)"></div>' +
                    '<button class="expand-btn" title="展开更多">▼</button></div>' +
                    '<div class="sub-cards" id="' + card.id + '-subcards">' + subHTML + '</div></div>';
            }
            return '';
        }

        function generateSubCardHTML(sc) {
            var iconHTML = renderIcon(sc);
            var onclick = sc.isLocal
                ? 'window.location.href=\'' + sc.url + '\''
                : 'window.open(\'' + sc.url + '\', \'_blank\')';
            if (sc.content !== undefined) {
                return '<div class="sub-card compact-card" onclick="' + onclick + '">' +
                    iconHTML +
                    '<div class="link-content"><span class="link-url">' + sc.content + '</span>' +
                    (sc.note ? '<span class="link-note">' + sc.note + '</span>' : '') +
                    '</div></div>';
            }
            return '<div class="sub-card two-line-card" onclick="' + onclick + '">' +
                '<div class="card-header">' + iconHTML +
                '<h3 class="link-title">' + sc.title + '</h3></div>' +
                '<p class="link-url">' + (sc.desc || '') + '</p></div>';
        }

        function generateStaticGrid(data) {
            var html = '<div class="links-grid">';
            data.forEach(function(card) { html += generateCardHTML(card); });
            html += '</div>';
            return html;
        }

        function getVisibleCount(prefix, layout) {
            if (prefix === 'video') return layout === 'mobile' ? 4 : layout === 'tablet' ? 6 : 8;
            if (prefix === 'ai') return layout === 'tablet' ? 3 : 4;
            return 999;
        }

        function generateDynamicGrid(prefix, data, layout) {
            var count = getVisibleCount(prefix, layout);
            var visible = data.slice(0, count);
            var hidden = data.slice(count);
            var html = '<div class="links-grid">';
            visible.forEach(function(card) { html += generateCardHTML(card); });
            html += '</div>';
            if (hidden.length > 0) {
                html += '<button class="expand-section-btn" onclick="toggleSection(\'' + prefix + '\')" id="' + prefix + '-expand-btn">' +
                    '<span>展开卡片</span><span class="arrow">▼</span></button>';
                html += '<div class="hidden-cards" id="' + prefix + '-hidden-cards">';
                hidden.forEach(function(card) { html += generateCardHTML(card); });
                html += '</div>';
                html += '<button class="expand-section-btn" onclick="toggleSection(\'' + prefix + '\')" id="' + prefix + '-collapse-btn" style="display: none;">' +
                    '<span>折叠卡片</span><span class="arrow">▲</span></button>';
            }
            return html;
        }

        function generateEmailCardHTML() {
            var tabsHTML = '';
            emailData.forEach(function(em, i) {
                var cls = i === 0 ? ' active' : '';
                tabsHTML += '<div class="email-tab' + cls + '" onclick="event.stopPropagation(); switchEmail(' + i + ')" data-email="' + i + '">' + (i + 1) + '</div>';
            });
            return '<div class="card-container">' +
                '<div class="link-card email-card contact-card" onclick="openEmail(currentEmailData.url)">' +
                '<div class="email-main-content" id="email-main-content">' +
                '<div class="email-contact-header">' +
                renderIcon(emailData[0], 'id="email-icon"') +
                '<h3 class="link-title" id="email-title">' + emailData[0].title + '</h3>' +
                '</div>' +
                '<p class="email-contact-desc" id="email-address" onclick="event.stopPropagation(); window.open(currentEmailData.mailto, \'_blank\')">' + emailData[0].address + '</p>' +
                '</div>' +
                '<div class="email-tabs active-0" id="email-tabs">' + tabsHTML + '</div>' +
                '</div></div>';
        }

        function generateContactCardHTML(card) {
            return '<div class="link-card contact-card" onclick="window.open(\'' + card.url + '\', \'_blank\')">' +
                '<div class="contact-header">' +
                renderIcon(card) +
                '<h3 class="link-title">' + card.title + '</h3>' +
                '</div>' +
                '<p class="contact-desc" onclick="event.stopPropagation(); window.open(\'' + card.descUrl + '\', \'_blank\')">' + card.desc + '</p>' +
                '</div>';
        }

        function generateContactGrid() {
            var html = '<div class="links-grid contact-row">';
            html += generateEmailCardHTML();
            contactData.forEach(function(card) { html += generateContactCardHTML(card); });
            html += '</div>';
            return html;
        }

        function handleCardClick(event, url, subcardId) {
            var card = event.currentTarget;
            var rect = card.getBoundingClientRect();
            var clickX = event.clientX - rect.left;
            if (clickX > rect.width * 3 / 5) {
                var btn = card.querySelector('.expand-btn');
                if (btn) toggleSubCards(subcardId, btn);
            } else {
                window.open(url, '_blank');
            }
        }

        function handleExpandZone(subcardId, zone) {
            var btn = zone.closest('.link-card').querySelector('.expand-btn');
            if (btn) toggleSubCards(subcardId, btn);
        }

        function closeCurrentExpanded() {
            if (!currentExpanded) return;
            var subcards = document.getElementById(currentExpanded);
            if (subcards) {
                var button = subcards.parentElement.querySelector('.expand-btn');
                var cardContainer = button ? button.closest('.card-container') : null;
                subcards.classList.remove('expanded');
                if (button) button.classList.remove('expanded');
                if (cardContainer) cardContainer.classList.remove('active');
            }
            currentExpanded = null;
            document.getElementById('overlay').classList.remove('active');
        }

        function toggleSubCards(subcardId, button) {
            var subcards = document.getElementById(subcardId);
            var overlay = document.getElementById('overlay');
            var cardContainer = button.closest('.card-container');
            var isExpanded = subcards.classList.contains('expanded');

            if (currentExpanded && currentExpanded !== subcardId) {
                var otherSubcards = document.getElementById(currentExpanded);
                if (otherSubcards) {
                    var otherButton = otherSubcards.parentElement.querySelector('.expand-btn');
                    var otherContainer = otherButton.closest('.card-container');
                    otherSubcards.classList.remove('expanded');
                    otherButton.classList.remove('expanded');
                    otherContainer.classList.remove('active');
                }
            }

            if (isExpanded) {
                subcards.classList.remove('expanded');
                button.classList.remove('expanded');
                cardContainer.classList.remove('active');
                overlay.classList.remove('active');
                currentExpanded = null;
            } else {
                subcards.classList.add('expanded');
                button.classList.add('expanded');
                cardContainer.classList.add('active');
                overlay.classList.add('active');
                currentExpanded = subcardId;
            }
        }

        function toggleSection(prefix) {
            var section = document.getElementById(prefix + '-hidden-cards');
            var expandBtn = document.getElementById(prefix + '-expand-btn');
            var collapseBtn = document.getElementById(prefix + '-collapse-btn');
            var isExpanded = section.classList.contains('expanded');
            if (isExpanded) {
                section.classList.remove('hover-ready');
                section.classList.add('collapsing');
                collapseBtn.classList.add('moving');
                setTimeout(function() {
                    section.classList.remove('expanded', 'collapsing');
                    collapseBtn.style.display = 'none';
                    collapseBtn.classList.remove('moving');
                    setTimeout(function() {
                        expandBtn.style.display = 'flex';
                        expandBtn.classList.remove('moving');
                    }, 100);
                }, 600);
            } else {
                expandBtn.classList.add('moving');
                setTimeout(function() {
                    expandBtn.style.display = 'none';
                    section.classList.add('expanded');
                    setTimeout(function() { section.classList.add('hover-ready'); }, 2500);
                    setTimeout(function() {
                        collapseBtn.style.display = 'flex';
                        collapseBtn.classList.remove('moving');
                    }, 400);
                }, 200);
            }
        }

        function autoExpandSection(prefix) {
            var section = document.getElementById(prefix + '-hidden-cards');
            var expandBtn = document.getElementById(prefix + '-expand-btn');
            var collapseBtn = document.getElementById(prefix + '-collapse-btn');
            if (!section || !expandBtn) return;
            expandBtn.style.display = 'none';
            section.classList.add('expanded', 'hover-ready');
            if (collapseBtn) collapseBtn.style.display = 'flex';
        }

        function switchEmail(index) {
            if (isAnimating) return;
            var currentIndex = emailData.indexOf(currentEmailData);
            if (currentIndex === index) return;
            isAnimating = true;
            var mainContent = document.getElementById('email-main-content');
            mainContent.classList.add('slide-out');
            setTimeout(function() {
                currentEmailData = emailData[index];
                var emailIconEl = document.getElementById('email-icon');
                if (currentEmailData.iconImg) {
                    emailIconEl.innerHTML = '<img src="' + currentEmailData.iconImg + '" alt="" />';
                    emailIconEl.className = 'link-icon';
                } else if (currentEmailData.icon && currentEmailData.icon.charAt(0) === '<') {
                    emailIconEl.innerHTML = currentEmailData.icon;
                    emailIconEl.className = 'link-icon link-icon-svg';
                } else {
                    emailIconEl.innerHTML = currentEmailData.icon || '';
                    emailIconEl.className = 'link-icon';
                }
                document.getElementById('email-title').textContent = currentEmailData.title;
                document.getElementById('email-address').textContent = currentEmailData.address;
                var addressElement = document.getElementById('email-address');
                addressElement.onclick = function(event) {
                    event.stopPropagation();
                    window.open(currentEmailData.mailto, '_blank');
                };
                mainContent.classList.remove('slide-out');
                mainContent.classList.add('slide-in');
                setTimeout(function() {
                    mainContent.classList.remove('slide-in');
                    mainContent.classList.add('slide-in-active');
                    setTimeout(function() {
                        mainContent.classList.remove('slide-in-active');
                        isAnimating = false;
                    }, 400);
                }, 50);
            }, 200);
            document.querySelectorAll('.email-tab').forEach(function(tab, i) {
                if (i === index) tab.classList.add('active');
                else tab.classList.remove('active');
            });
            document.getElementById('email-tabs').className = 'email-tabs active-' + index;
        }

        function openEmail(url) { window.open(url, '_blank'); }

        // ================================================================
        // 初始化 & 事件监听
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            currentLayout = detectLayout();
            document.getElementById('usb-drive-content').innerHTML = generateStaticGrid(usbDriveData);
            document.getElementById('teaching-content').innerHTML = generateStaticGrid(teachingData);
            document.getElementById('contact-content').innerHTML = generateContactGrid();
            document.getElementById('online-ai-content').innerHTML = generateDynamicGrid('ai', onlineAIData, currentLayout);
            document.getElementById('video-content').innerHTML = generateDynamicGrid('video', videoData, currentLayout);
            if (currentLayout === 'desktop') {
                autoExpandSection('ai');
                autoExpandSection('video');
            }

            // 初始定位悬浮切换按钮
            alignStyleSwitcher();

            // ResizeObserver：容器尺寸变化时自动对齐（含 CSS transition 期间）
            var containerEl = document.querySelector('.container');
            if (typeof ResizeObserver !== 'undefined' && containerEl) {
                new ResizeObserver(function() {
                    alignStyleSwitcher();
                }).observe(containerEl);
            }
        });

        window.addEventListener('resize', function() {
            // 兜底：每次 resize 都重新定位
            alignStyleSwitcher();

            var newLayout = detectLayout();
            if (newLayout !== currentLayout) {
                currentLayout = newLayout;
                if (currentExpanded) {
                    currentExpanded = null;
                    document.getElementById('overlay').classList.remove('active');
                }
                document.getElementById('online-ai-content').innerHTML = generateDynamicGrid('ai', onlineAIData, currentLayout);
                document.getElementById('video-content').innerHTML = generateDynamicGrid('video', videoData, currentLayout);
                if (currentLayout === 'desktop') {
                    autoExpandSection('ai');
                    autoExpandSection('video');
                }
            }
        });

        document.getElementById('overlay').addEventListener('click', function() {
            closeCurrentExpanded();
        });

        document.addEventListener('click', function(e) {
            if (e.target.closest('.sub-cards')) e.stopPropagation();
        });

        // ================================================================
        // 波纹效果
        // ================================================================
        (function initRipple() {
            var rippleSelector = [
                '.link-card',
                '.sub-card',
                '.back-link',
                '.expand-section-btn',
                '.style-btn',
                '.style-opt',
                '.email-tab',
                '#backHomeBtn',
                '.error-home-btn'
            ].join(',');

            function createRipple(e, target) {
                if (target.classList.contains('style-opt-active')) return;

                var rect = target.getBoundingClientRect();
                var point = e.touches && e.touches[0] ? e.touches[0] : e;
                var x = point.clientX - rect.left;
                var y = point.clientY - rect.top;
                var size = Math.max(rect.width, rect.height) * 2;

                var ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (x - size / 2) + 'px';
                ripple.style.top  = (y - size / 2) + 'px';

                target.appendChild(ripple);

                setTimeout(function() {
                    if (ripple && ripple.parentNode) {
                        ripple.parentNode.removeChild(ripple);
                    }
                }, 850);
            }

            var supportsPointer = 'PointerEvent' in window;
            var eventName = supportsPointer ? 'pointerdown' : 'mousedown';

            document.addEventListener(eventName, function(e) {
                var target = e.target.closest(rippleSelector);
                if (!target) return;
                createRipple(e, target);
            }, { passive: true });

            if (!supportsPointer) {
                document.addEventListener('touchstart', function(e) {
                    var target = e.target.closest(rippleSelector);
                    if (!target) return;
                    createRipple(e, target);
                }, { passive: true });
            }
        })();
    </script>
</body>
