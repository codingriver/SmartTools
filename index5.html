    <meta name="referrer" content="origin">
    <script>
    (function () {
        var patched = false;

        function patchLink(a) {
            if (!a || !a.getAttribute) return;
            var href = a.getAttribute('href') || '';
            try {
                var u = new URL(href, location.href);
                if (u.protocol !== 'http:' && u.protocol !== 'https:') return;
            } catch (e) {
                return;
            }
            if (a.getAttribute('referrerpolicy') !== 'origin') {
                a.setAttribute('referrerpolicy', 'origin');
            }
            var rel = a.getAttribute('rel') || '';
            if (/\bnoreferrer\b/i.test(rel)) {
                rel = rel.split(/\s+/).filter(function (v) {
                    return v && v.toLowerCase() !== 'noreferrer';
                }).join(' ');
                if (rel) a.setAttribute('rel', rel);
                else a.removeAttribute('rel');
            }
        }

        function patchAll() {
            if (patched) return;
            patched = true;
            document.querySelectorAll('a[href]').forEach(patchLink);
        }

        document.addEventListener('DOMContentLoaded', patchAll, { once: true });
        document.addEventListener('pointerdown', function (e) {
            var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
            patchLink(a);
        }, true);
        document.addEventListener('click', function (e) {
            var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
            patchLink(a);
        }, true);
    })();
    </script>

    <!-- ★ A1.5 公开访问 slug:早期标记 + 隐藏导航按钮 -->
    <script>
    (function () {
        try {
            var u = '';
            // 形式 1:/@<slug>(主推,2026-05-22)或 /u/<slug>(永久兼容)— 路径形式
            var pathMatch = (location.pathname || '').match(/^\/(?:@|u\/)([a-z0-9][a-z0-9_\-]{0,31})/i);
            if (pathMatch) u = pathMatch[1].toLowerCase();
            // 形式 2:?u=<slug>(兼容老链接,只在 path 未匹配时 fallback)
            if (!u) {
                var qMatch = (location.search || '').match(/[?&]u=([a-z0-9][a-z0-9_\-]{0,31})(?:&|$)/i);
                if (qMatch) u = qMatch[1].toLowerCase();
            }
            if (u) {
                document.documentElement.setAttribute('data-public-mode', u);
                document.addEventListener('DOMContentLoaded', function () {
                    // 2026-05-22:主题切换链接统一重写为 /@<slug>?theme=<key>(主推形式)
                    // 之前是 indexN.html?u=<slug>(query 形式),现在直接走 @ catch-all
                    var THEME_MAP = { 'index1.html':'nebula','index2.html':'notion','index3.html':'stripe','index4.html':'dark','index5.html':'mint' };
                    document.querySelectorAll('.style-opt[href]').forEach(function (a) {
                        var href = a.getAttribute('href') || '';
                        var key = THEME_MAP[href];
                        if (!key) return;
                        a.setAttribute('href', '/@' + encodeURIComponent(u) + '?theme=' + key);
                    });
                });
            }
        } catch (e) {}
    })();
    </script>

            .contact-row { grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: calc(75% + 10px); }
            .section-title { font-size: 12px; margin-bottom: 11px; }
            .link-card { padding: 18px; }
            .hidden-cards { margin-top: 20px; margin-bottom: 15px; }
            .email-card { padding: 18px; padding-right: 55%; }
            .link-card-with-expand { padding-right: 46px; }
            .expand-btn { right: 25px; width: 22px; height: 22px; }
            .expand-btn::after { width: 8px; height: 8px; }
            .link-icon { font-size: 22px; margin-bottom: 8px; }
            .link-title { font-size: 15px; margin-bottom: 5px; }
            .link-desc, .link-desc-clickable { font-size: 12px; }
            .contact-header .link-icon { font-size: 22px; }
            .contact-header .link-title { font-size: 15px; }
            .contact-desc, .email-contact-desc { font-size: 12px; margin-left: 30px; }
            .email-contact-header .link-icon { font-size: 22px; }
            .email-contact-header .link-title { font-size: 15px; }
            .email-tab { font-size: 13px; padding: 5px 3px; border-radius: 0 12px 12px 0; }
        }

        @media (max-width: 480px) {
            .header { padding-top: 10px; }
            .container { width: 96%; max-width: none; padding: 0; min-height: calc(100vh - 40px); }
            body { padding: 10px; padding-bottom: 30px; }
            .title { font-size: 24px; }
            .link-card { padding: 12px; }
            .link-card-with-expand { padding-right: 34px; }
            .email-card { padding: 12px; padding-right: 60%; }
            .links-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .hidden-cards.expanded { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .contact-row { grid-template-columns: 1fr !important; max-width: none !important; }
            .email-tab { font-size: 11px; padding: 3px 1px; border-radius: 0 8px 8px 0; }
            .expand-btn { right: 17px; width: 18px; height: 18px; }
            .expand-btn::after { width: 6px; height: 6px; }
            .sub-card { padding: 8px 12px; }
            .backup-card, .compact-card { padding: 4px 8px !important; gap: 6px !important; }
            .two-line-card { padding: 6px 10px !important; }
            .two-line-card .card-header { gap: 5px; margin-bottom: 2px; }
            .two-line-card .link-icon { font-size: 18px !important; }
            .two-line-card .link-title { font-size: 13px !important; }
            .two-line-card .link-url { font-size: 10px; }
            .link-icon { font-size: 18px; margin-bottom: 4px; }
            .sub-card .link-icon { font-size: 18px; }
            .backup-card .link-icon { font-size: 14px; }
            .compact-card .link-icon { font-size: 12px !important; }
            .compact-card .link-content { font-size: 10px; }
            .compact-card .link-note { font-size: 9px; }
            .link-title { font-size: 13px; }
            .sub-card .link-title { font-size: 13px; }
            .backup-card .link-title { font-size: 11px; }
            .link-desc, .link-desc-clickable { font-size: 10px; }
            .sub-card .link-desc, .sub-card .link-desc-clickable { font-size: 10px; }
            .section-title { font-size: 11px; margin-bottom: 8px; }
            .sub-cards { left: 1%; right: 1%; }
            .expand-section-btn { font-size: 12px; padding: 5px 16px; width: 40%; min-width: 120px; height: 28px; }
            #video-collapse-btn { margin-top: 6px; margin-bottom: 8px; }
            #ai-collapse-btn { margin-top: 6px; margin-bottom: 8px; }
            .hidden-cards { margin-top: 12px; margin-bottom: 12px; }
            .back-link { font-size: 12px; padding: 10px 16px; min-width: 100px; }
            .contact-card-wrap { padding: 12px 14px; }
            .contact-header .link-icon { font-size: 18px; }
            .contact-header .link-title { font-size: 13px; }
            .contact-desc, .email-contact-desc { font-size: 10px; margin-left: 26px; }
            .email-contact-header .link-icon { font-size: 18px; }
            .email-contact-header .link-title { font-size: 13px; }
            .style-btn { font-size: 12px; padding: 4px 8px; }
            .style-opt { font-size: 12px; padding: 8px 10px; }
            .style-switcher { min-width: 96px; }

            /* ★ 锁定药丸在手机上行距更紧凑 */
            .section.section-locked-pill {
                margin-bottom: 8px;
            }
            .section.section-locked-pill + .section.section-locked-pill {
                margin-top: -2px;
            }
        }

        /* 统一普通书签卡片尺寸，避免短内容/少卡片区块显得更小 */
        .links-grid:not(.contact-row),
        .hidden-cards.expanded {
            align-items: stretch;
            grid-auto-rows: 1fr;
        }

        .links-grid:not(.contact-row) > .link-card,
        .links-grid:not(.contact-row) > .card-container,
        .hidden-cards.expanded > .link-card,
        .hidden-cards.expanded > .card-container {
            min-width: 0;
            height: 100%;
        }

        .links-grid:not(.contact-row) > .card-container > .link-card,
        .hidden-cards.expanded > .card-container > .link-card {
            display: block;
            height: 100%;
        }

        @media (min-width: 800px) {
            .links-grid:not(.contact-row) > .link-card,
            .links-grid:not(.contact-row) > .card-container > .link-card,
            .hidden-cards.expanded > .link-card,
            .hidden-cards.expanded > .card-container > .link-card {
                min-height: 104px;
            }
        }

        @media (min-width: 481px) and (max-width: 799px) {
            .links-grid:not(.contact-row) > .link-card,
            .links-grid:not(.contact-row) > .card-container > .link-card,
            .hidden-cards.expanded > .link-card,
            .hidden-cards.expanded > .card-container > .link-card {
                min-height: 100px;
            }
        }

        @media (max-width: 480px) {
            .links-grid:not(.contact-row) > .link-card,
            .links-grid:not(.contact-row) > .card-container > .link-card,
            .hidden-cards.expanded > .link-card,
            .hidden-cards.expanded > .card-container > .link-card {
                min-height: 78px;
            }
        }

        #backHomeBtn {
            position: fixed;
            bottom: 33px; left: 10px;
            z-index: 10000;
            padding: 4px 10px;
            background: rgba(225, 250, 251, 0.25);
            color: var(--mt-text-2);
            border: 1px solid var(--mt-border);
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', -apple-system, sans-serif;
            cursor: pointer;
            box-shadow: var(--mt-shadow-sm);
            transition: all 0.25s var(--mt-ease);
            letter-spacing: -0.01em;
            backdrop-filter: blur(2px);
        }
        #backHomeBtn:hover {
            color: var(--mt-green);
            border-color: var(--mt-border-hover);
            box-shadow: var(--mt-shadow-md);
        }

        /* ================================================================
           风格切换下拉 — 页面滚动跟随版（与 #backHomeBtn 同透明度/模糊）
           ================================================================ */
        .style-switcher {
            position: absolute;
            top: 28px;
            z-index: 10000;
            min-width: 108px;
        }

        .style-btn {
            width: 100%;
            background: rgba(225, 250, 251, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid var(--mt-border);
            color: var(--mt-text-2);
            border-radius: 8px;
            padding: 7px 11px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
            white-space: nowrap;
            transition: all 0.25s var(--mt-ease);
            box-shadow: var(--mt-shadow-sm);
            font-family: inherit;
            letter-spacing: -0.01em;
        }
        .style-btn:hover {
            border-color: var(--mt-border-hover);
            color: var(--mt-green);
            box-shadow: var(--mt-shadow-md);
        }

        .style-caret {
            font-size: 10px; line-height: 1;
            transition: transform 0.22s ease;
            opacity: 0.5;
        }
        .style-switcher.open .style-caret,
        .style-btn.menu-open .style-caret { transform: rotate(180deg); }

        .style-menu {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0; right: 0;
            background: rgba(225, 250, 251, 0.15);
            backdrop-filter: blur(2px) saturate(1.3);
            -webkit-backdrop-filter: blur(2px) saturate(1.3);
            border: 1px solid var(--mt-border-strong);
            overflow: hidden;
            box-shadow: var(--mt-shadow-lg);
            animation: menuFadeIn 0.18s ease;
            border-radius: 8px;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .style-switcher.open .style-menu,
        .style-menu.menu-open { display: block; }

        .style-opt {
            display: block;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--mt-text-2);
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
            white-space: nowrap;
            font-family: inherit;
        }
        .style-opt:hover {
            background: var(--mt-green-wash);
            color: var(--mt-green);
        }

        .style-opt-active {
            background: var(--mt-green-wash);
            color: var(--mt-green) !important;
            font-weight: 600;
            cursor: default;
        }
        .style-opt-active:hover { background: var(--mt-green-wash); }

        /* ================================================================
         * 交互增强
         * ================================================================ */

        a, button, [onclick], [role="option"],
        .link-card, .sub-card, .back-link, .expand-section-btn,
        .expand-zone, .email-tab, .style-btn, .style-opt,
        #backHomeBtn, .error-home-btn, .contact-desc,
        .email-contact-desc, .link-desc-clickable {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .link-card,
        .sub-card,
        .back-link,
        .expand-section-btn,
        .style-btn,
        .style-opt,
        .error-home-btn {
            position: relative;
            overflow: hidden;
        }

        #backHomeBtn {
            overflow: hidden;
        }

        .card-container > .link-card {
            overflow: hidden;
        }
        .card-container {
            overflow: visible;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            background-color: #0D9373;
            opacity: 0.35;
        }

        @keyframes ripple-anim {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        .error-home-btn .ripple {
            background-color: #ffffff;
            opacity: 0.45;
        }

        .email-tab .ripple {
            background-color: #087F5B;
            opacity: 0.3;
        }

        .style-opt .ripple {
            background-color: #0D9373;
            opacity: 0.25;
        }

        /* 🔐 锁定按钮的波纹用白色（红底上白波纹） */
        .enc-lock-fab .ripple {
            background-color: #ffffff;
            opacity: 0.4;
        }

        .link-card,
        .sub-card,
        .back-link,
        .expand-section-btn,
        .style-btn,
        .style-opt,
        .email-tab,
        #backHomeBtn,
        .error-home-btn,
        .enc-lock-fab {
            -webkit-user-select: none;
            user-select: none;
        }

        .email-tab:active {
            filter: none !important;
            transition: none !important;
        }

        .link-card.email-card {
            transform: none;
            transition: transform .18s ease,
                        box-shadow .18s ease,
                        border-color .18s ease,
                        background .18s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .link-card.email-card:hover,
            .link-card.email-card:active,
            .link-card.email-card:hover:active,
            .link-card.email-card:focus {
                transform: translateY(-2px) !important;
            }
        }

        @media (hover: none) {
            .link-card.email-card,
            .link-card.email-card:active,
            .link-card.email-card:focus {
                transform: none !important;
            }
        }

        /* ★ contact-card-wrap：在外观上更接近邮箱卡片（右侧渐变装饰），不影响功能 */
        .contact-card-wrap {
            position: relative;
            overflow: hidden;
        }
        .contact-card-wrap::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 70%;
            background: linear-gradient(
                to left,
                rgba(13, 147, 115, 0.15) 0%,
                rgba(13, 147, 115, 0.03) 55%,
                rgba(13, 147, 115, 0) 100%
            );
            pointer-events: none;
            z-index: 0;
        }
        .contact-card-wrap > * {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
