name: Auto-update data.js timestamp

on:
  push:
    branches: [main]
    paths:
      - 'data.js'

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    # 避免 bot 自己的 commit 再次触发，造成死循环
    if: "!contains(github.event.head_commit.message, '[skip-ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: node scripts/update-timestamp.js

      - name: Commit back if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.js; then
            echo "No change in data.js"
          else
            git add data.js
            git commit -m "chore: auto-update data.js timestamp [skip-ci]"
            git push
          fi