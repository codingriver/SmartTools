    <style>
        :root {
            --fr-blue: #0099FF;
            --fr-blue-light: #33adff;
            --fr-blue-dim: #006bb3;
            --fr-blue-glow: rgba(0, 153, 255, 0.10);
            --fr-blue-border: rgba(0, 153, 255, 0.28);
            --fr-blue-border-strong: rgba(0, 153, 255, 0.50);
            --fr-surface-0: #000000;
            --fr-surface-1: #0a0a0a;
            --fr-surface-2: #111111;
            --fr-surface-3: #191919;
            --fr-surface-4: #222222;
            --fr-border: rgba(255, 255, 255, 0.08);
            --fr-border-hover: rgba(255, 255, 255, 0.15);
            --fr-text-1: #ffffff;
            --fr-text-2: rgba(255, 255, 255, 0.55);
            --fr-text-3: rgba(255, 255, 255, 0.35);
            --fr-radius: 12px;
            --fr-radius-s: 8px;
            --fr-ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--fr-surface-0);
            color: var(--fr-text-1);
            min-height: 100vh;
            padding: 12px;
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--fr-blue) 50%, transparent 100%);
            z-index: 9999;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 153, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 153, 255, 0.02) 1px, transparent 1px);
            background-size: 64px 64px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 4px;
            transition: max-width 0.4s var(--fr-ease);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            padding-top: 15px;
        }

        .title {
            color: var(--fr-text-1);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
            transition: font-size 0.4s var(--fr-ease);
        }

        .footer {
            text-align: center;
            margin-top: 1px;
            color: var(--fr-text-3);
            font-size: 12px;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: errorFadeIn 0.6s ease-out;
        }

        @keyframes errorFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-card {
            background: var(--fr-surface-2);
            border: 1px solid var(--fr-border);
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .error-emoji {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: errorBounce 2s ease-in-out infinite;
        }

        @keyframes errorBounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .error-title {
            color: var(--fr-text-1);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .error-message {
            color: var(--fr-text-2);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .error-hint-box {
            background: rgba(0, 153, 255, 0.05);
            border: 1px solid var(--fr-border);
            border-radius: 12px;
            padding: 16px 18px;
            text-align: left;
            margin-bottom: 24px;
        }

        .error-hint-title {
            color: var(--fr-blue);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .error-hint-item {
            color: var(--fr-text-2);
            font-size: 13px;
            line-height: 1.6;
            padding-left: 18px;
            position: relative;
            margin-bottom: 6px;
        }

        .error-hint-item:last-child { margin-bottom: 0; }

        .error-hint-item::before {
            content: '›';
            position: absolute;
            left: 4px;
            color: var(--fr-blue);
            font-weight: bold;
        }

        .error-hint-item code {
            background: rgba(0, 153, 255, 0.1);
            color: var(--fr-blue-light);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 12px;
        }

        .error-home-btn {
            display: inline-block;
            background: var(--fr-blue);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s var(--fr-ease);
            border: none;
        }

        .error-home-btn:hover {
            background: var(--fr-blue-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 153, 255, 0.3);
        }

        .link-icon {
            display: inline-flex;
            width: 1.2em;
            height: 1.2em;
            vertical-align: -0.125em;
        }

        .link-icon img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .link-icon-svg {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .link-icon-svg svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .back-nav {
            display: flex;
            justify-content: center;
        }

        .back-link {
            background: var(--fr-surface-2);
            border: 1px solid var(--fr-border);
            border-right: 1px solid rgba(0, 153, 255, 0.40);
            border-bottom: 1px solid rgba(0, 153, 255, 0.40);
            color: var(--fr-text-2);
            text-decoration: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s var(--fr-ease);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            min-width: 120px;
            position: relative;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 153, 255, 0.08), transparent);
            transition: left 0.5s;
        }

        .back-link:hover::before { left: 100%; }

        .back-link:hover {
            background: var(--fr-surface-3);
            color: var(--fr-text-1);
            border-color: var(--fr-blue-border);
            border-right-color: rgba(0, 153, 255, 0.85);
            border-bottom-color: rgba(0, 153, 255, 0.85);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 153, 255, 0.32);
        }

        .section {
            margin-bottom: 30px;
            transition: margin-bottom 0.4s var(--fr-ease);
        }

        /* ★ 锁定加密大类：只显示小药丸，不显示标题，行距紧凑 */
        .section.section-locked-pill {
            margin-bottom: 10px;
        }
        .section.section-locked-pill + .section.section-locked-pill {
            margin-top: -4px;
        }

        /* ============ 分类标题：左对齐 + 蓝色渐隐光线 ============ */
        .section-title {
            color: var(--fr-text-2);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            text-align: left;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            transition: font-size 0.4s var(--fr-ease),
                       margin-bottom 0.4s var(--fr-ease);
        }

        .section-title::after {
            content: '';
            flex: 0.25;
            height: 1px;
            border-radius: 1px;
            background: linear-gradient(90deg,
                rgba(0, 153, 255, 0.55),
                rgba(0, 153, 255, 0.25) 40%,
                rgba(0, 153, 255, 0.06) 75%,
                transparent 100%);
            box-shadow:
                0 0 4px rgba(0, 153, 255, 0.20),
                0 0 10px rgba(0, 153, 255, 0.08);
        }

        .expand-section-btn {
            background: var(--fr-surface-2);
            border: 1px solid var(--fr-border);
            color: var(--fr-text-2);
            border-radius: 10px;
            padding: 6px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.35s var(--fr-ease);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            margin: 15px auto;
            width: 30%;
            min-width: 140px;
            height: 32px;
            opacity: 1;
            transform: translateY(0);
            position: relative;
            overflow: hidden;
            font-family: inherit;
            letter-spacing: -0.01em;
        }

        .expand-section-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 153, 255, 0.06), transparent);
            transition: left 0.5s;
        }

        .expand-section-btn:hover::before { left: 100%; }

        .expand-section-btn:hover {
            background: var(--fr-surface-3);
            border-color: var(--fr-blue-border);
            color: var(--fr-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 153, 255, 0.1);
        }

        .expand-section-btn .arrow {
            font-size: 11px;
            transition: transform 0.3s ease;
        }

        .expand-section-btn.expanded .arrow {
            transform: rotate(180deg);
        }

        .expand-section-btn.moving {
            opacity: 0;
            transform: translateY(-20px);
        }

        #video-collapse-btn { margin-top: 8px; margin-bottom: 15px; }
        #ai-collapse-btn { margin-top: 8px; margin-bottom: 15px; }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            transition: gap 0.4s var(--fr-ease);
            justify-content: center;
            width: 100%;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            transition: gap 0.4s var(--fr-ease);
            justify-content: center;
            width: 100%;
            max-width: none;
            margin: 0 auto;
        }

        .hidden-cards {
            display: none;
            margin-top: 19px;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden-cards.expanded {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            opacity: 1;
            transform: translateY(0);
            transition: gap 0.4s var(--fr-ease);
            justify-content: center;
        }

        .hidden-cards .link-card,
        .hidden-cards .card-container {
            opacity: 0;
            transform: translateY(-20px);
        }

        .hidden-cards .link-card:nth-child(1),
        .hidden-cards .card-container:nth-child(1),
        .hidden-cards .link-card:nth-child(2),
        .hidden-cards .card-container:nth-child(2) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.1s;
        }

        .hidden-cards .link-card:nth-child(3),
        .hidden-cards .card-container:nth-child(3),
        .hidden-cards .link-card:nth-child(4),
        .hidden-cards .card-container:nth-child(4) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.3s;
        }

        .hidden-cards .link-card:nth-child(5),
        .hidden-cards .card-container:nth-child(5),
        .hidden-cards .link-card:nth-child(6),
        .hidden-cards .card-container:nth-child(6) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.5s;
        }

        .hidden-cards .link-card:nth-child(7),
        .hidden-cards .card-container:nth-child(7),
        .hidden-cards .link-card:nth-child(8),
        .hidden-cards .card-container:nth-child(8) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.7s;
        }

        .hidden-cards .link-card:nth-child(9),
        .hidden-cards .card-container:nth-child(9),
        .hidden-cards .link-card:nth-child(10),
        .hidden-cards .card-container:nth-child(10) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.9s;
        }

        .hidden-cards .link-card:nth-child(11),
        .hidden-cards .card-container:nth-child(11),
        .hidden-cards .link-card:nth-child(12),
        .hidden-cards .card-container:nth-child(12) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.1s;
        }

        .hidden-cards .link-card:nth-child(13),
        .hidden-cards .card-container:nth-child(13),
        .hidden-cards .link-card:nth-child(14),
        .hidden-cards .card-container:nth-child(14) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.3s;
        }

        .hidden-cards .link-card:nth-child(15),
        .hidden-cards .card-container:nth-child(15),
        .hidden-cards .link-card:nth-child(16),
        .hidden-cards .card-container:nth-child(16) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.5s;
        }

        .hidden-cards .link-card:nth-child(17),
        .hidden-cards .card-container:nth-child(17),
        .hidden-cards .link-card:nth-child(18),
        .hidden-cards .card-container:nth-child(18) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.7s;
        }

        .hidden-cards .link-card:nth-child(19),
        .hidden-cards .card-container:nth-child(19),
        .hidden-cards .link-card:nth-child(20),
        .hidden-cards .card-container:nth-child(20) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.9s;
        }

        .hidden-cards .link-card:nth-child(n+21),
        .hidden-cards .card-container:nth-child(n+21) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 2.1s;
        }

        @keyframes slideInDownRowWithHover {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hidden-cards.expanded.hover-ready .link-card {
            animation-name: none !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
            transition: transform 0.25s var(--fr-ease), box-shadow 0.25s var(--fr-ease), border-color 0.25s ease !important;
        }

        .hidden-cards.expanded.hover-ready .card-container .link-card {
            animation-name: none !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
            transition: transform 0.25s var(--fr-ease), box-shadow 0.25s var(--fr-ease), border-color 0.25s ease !important;
        }

        .hidden-cards.expanded.hover-ready .link-card:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 6px 24px rgba(0, 153, 255, 0.32) !important;
            border-color: var(--fr-blue-border) !important;
            border-right-color: rgba(0, 153, 255, 0.85) !important;
            border-bottom-color: rgba(0, 153, 255, 0.85) !important;
            z-index: 2 !important;
        }

        .hidden-cards.expanded.hover-ready .card-container .link-card:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 6px 24px rgba(0, 153, 255, 0.32) !important;
            border-color: var(--fr-blue-border) !important;
            border-right-color: rgba(0, 153, 255, 0.85) !important;
            border-bottom-color: rgba(0, 153, 255, 0.85) !important;
            z-index: 2 !important;
        }

        @keyframes slideInDownRow {
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-cards.collapsing .link-card,
        .hidden-cards.collapsing .card-container {
            animation: slideOutUpRow 0.4s ease forwards;
        }

        .hidden-cards.collapsing .link-card:nth-child(19),
        .hidden-cards.collapsing .card-container:nth-child(19),
        .hidden-cards.collapsing .link-card:nth-child(20),
        .hidden-cards.collapsing .card-container:nth-child(20) { animation-delay: 0s; }

        .hidden-cards.collapsing .link-card:nth-child(17),
        .hidden-cards.collapsing .card-container:nth-child(17),
        .hidden-cards.collapsing .link-card:nth-child(18),
        .hidden-cards.collapsing .card-container:nth-child(18) { animation-delay: 0.1s; }

        .hidden-cards.collapsing .link-card:nth-child(15),
        .hidden-cards.collapsing .card-container:nth-child(15),
        .hidden-cards.collapsing .link-card:nth-child(16),
        .hidden-cards.collapsing .card-container:nth-child(16) { animation-delay: 0.2s; }

        .hidden-cards.collapsing .link-card:nth-child(13),
        .hidden-cards.collapsing .card-container:nth-child(13),
        .hidden-cards.collapsing .link-card:nth-child(14),
        .hidden-cards.collapsing .card-container:nth-child(14) { animation-delay: 0.3s; }

        .hidden-cards.collapsing .link-card:nth-child(11),
        .hidden-cards.collapsing .card-container:nth-child(11),
        .hidden-cards.collapsing .link-card:nth-child(12),
        .hidden-cards.collapsing .card-container:nth-child(12) { animation-delay: 0.4s; }

        .hidden-cards.collapsing .link-card:nth-child(9),
        .hidden-cards.collapsing .card-container:nth-child(9),
        .hidden-cards.collapsing .link-card:nth-child(10),
        .hidden-cards.collapsing .card-container:nth-child(10) { animation-delay: 0.5s; }

        .hidden-cards.collapsing .link-card:nth-child(7),
        .hidden-cards.collapsing .card-container:nth-child(7),
        .hidden-cards.collapsing .link-card:nth-child(8),
        .hidden-cards.collapsing .card-container:nth-child(8) { animation-delay: 0.6s; }

        .hidden-cards.collapsing .link-card:nth-child(5),
        .hidden-cards.collapsing .card-container:nth-child(5),
        .hidden-cards.collapsing .link-card:nth-child(6),
        .hidden-cards.collapsing .card-container:nth-child(6) { animation-delay: 0.7s; }

        .hidden-cards.collapsing .link-card:nth-child(3),
        .hidden-cards.collapsing .card-container:nth-child(3),
        .hidden-cards.collapsing .link-card:nth-child(4),
        .hidden-cards.collapsing .card-container:nth-child(4) { animation-delay: 0.8s; }

        .hidden-cards.collapsing .link-card:nth-child(1),
        .hidden-cards.collapsing .card-container:nth-child(1),
        .hidden-cards.collapsing .link-card:nth-child(2),
        .hidden-cards.collapsing .card-container:nth-child(2) { animation-delay: 0.9s; }

        @keyframes slideOutUpRow {
            to { opacity: 0; transform: translateY(-20px); }
        }

        .card-container {
            position: relative;
            overflow: visible;
            z-index: 1;
        }

        .card-container.active {
            z-index: 20;
        }

        .card-container.active > .link-card {
            border-color: var(--fr-blue-border-strong);
            border-right-color: rgba(0, 153, 255, 0.95);
            border-bottom-color: rgba(0, 153, 255, 0.95);
            box-shadow: 0 0 20px rgba(0, 153, 255, 0.1);
        }

        .hidden-cards .card-container { z-index: 2; }
        .hidden-cards .card-container.active { z-index: 60; }

        .link-card {
            background: var(--fr-surface-2);
            border: 1px solid var(--fr-border);
            border-right: 1px solid rgba(0, 153, 255, 0.40);
            border-bottom: 1px solid rgba(0, 153, 255, 0.40);
