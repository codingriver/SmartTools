<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SmartTools Tabs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>SmartTools 标签导入</h1>
    <section class="group">
      <label class="field">
        <span>后台地址</span>
        <input id="configUrl" type="url" placeholder="https://your-domain/config.html">
      </label>
      <div class="url-btn-row">
        <button id="saveUrl" class="url-btn" type="button">保存地址</button>
        <button id="openBackend" class="url-btn" type="button">打开后台</button>
        <button id="openHome" class="url-btn" type="button">打开主页</button>
      </div>
    </section>

    <section class="group">
      <h2>发送标签到后台确认导入</h2>
      <div class="btn-row">
        <button id="importCurrent" type="button">当前窗口标签</button>
        <button id="importAll" type="button">所有窗口标签</button>
      </div>
    </section>

    <section class="group">
      <h2>复制所有打开标签为 JSON</h2>
      <div class="btn-row">
        <button id="copyCurrent" class="copy-btn" type="button">当前窗口标签</button>
        <button id="copyAll" class="copy-btn" type="button">所有窗口标签</button>
      </div>
    </section>

    <section class="group">
      <div class="section-head">
        <h2>复制所有打开标签为文本</h2>
        <label class="check">
          <input id="copyTextUrlsOnly" type="checkbox" checked>
          <span>仅 URL</span>
        </label>
      </div>
      <div class="btn-row">
        <button id="copyTextCurrent" class="copy-btn" type="button">当前窗口标签</button>
        <button id="copyTextAll" class="copy-btn" type="button">所有窗口标签</button>
      </div>
    </section>

    <section class="group">
      <h2>下载为 HTML 书签</h2>
      <div class="btn-row">
        <button id="exportCurrentFile" class="export-btn" type="button">当前窗口标签</button>
        <button id="exportAllFile" class="export-btn" type="button">所有窗口标签</button>
      </div>
    </section>

    <section class="group">
      <h2>下载为 JSON 书签</h2>
      <div class="btn-row">
        <button id="exportJsonCurrent" class="export-btn" type="button">当前窗口标签</button>
        <button id="exportJsonAll" class="export-btn" type="button">所有窗口标签</button>
      </div>
    </section>

    <p id="status" class="status"></p>
    <p class="hint">只处理 http/https 标签页，不包含 SmartTools 后台页本身。</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
