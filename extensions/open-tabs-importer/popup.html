<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SmartTools Tabs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>SmartTools 标签导入</h1>
    <div class="url-row">
      <div class="url-input-wrap">
        <label>
          后台地址
          <input id="configUrl" type="url" placeholder="https://your-domain/config.html">
        </label>
      </div>
      <div class="url-btn-wrap">
        <button id="saveUrl" type="button">保存地址</button>
        <button id="openBackend" type="button">打开后台</button>
      </div>
    </div>
    <p class="hint">先在浏览器中打开并登录 SmartTools 后台，再点击导入。</p>

    <div class="btn-row">
      <button id="importCurrent" type="button">导入当前窗口标签</button>
      <button id="importAll" type="button">导入所有窗口标签</button>
    </div>

    <div class="btn-row">
      <button id="copyCurrent" class="copy-btn" type="button">导入当前窗口标签到粘贴板</button>
      <button id="copyAll" class="copy-btn" type="button">导入所有窗口标签到粘贴板</button>
    </div>

    <div class="btn-row">
      <button id="exportCurrentFile" class="export-btn" type="button">导入当前窗口标签到文件</button>
      <button id="exportAllFile" class="export-btn" type="button">导入所有窗口标签到文件</button>
    </div>

    <p id="status" class="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
