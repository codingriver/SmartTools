<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SmartTools Tabs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>SmartTools 标签导入</h1>
    <label>
      后台地址
      <input id="configUrl" type="url" placeholder="https://your-domain/config.html">
    </label>
    <div class="url-btn-row">
      <button id="saveUrl" class="url-btn" type="button">保存地址</button>
      <button id="openBackend" class="url-btn" type="button">打开后台</button>
    </div>
<p id="status" class="status"></p>
    <p class="hint">先在浏览器中打开并登录 SmartTools 后台，再点击导入。</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
