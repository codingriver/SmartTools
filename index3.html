    <meta charset="UTF-8">
    <meta name="referrer" content="origin">
    <script>
    (function () {
        var patched = false;

        function patchLink(a) {
            if (!a || !a.getAttribute) return;
            var href = a.getAttribute('href') || '';
            try {
                var u = new URL(href, location.href);
                if (u.protocol !== 'http:' && u.protocol !== 'https:') return;
            } catch (e) {
                return;
            }
            if (a.getAttribute('referrerpolicy') !== 'origin') {
                a.setAttribute('referrerpolicy', 'origin');
            }
            var rel = a.getAttribute('rel') || '';
            if (/\bnoreferrer\b/i.test(rel)) {
                rel = rel.split(/\s+/).filter(function (v) {
                    return v && v.toLowerCase() !== 'noreferrer';
                }).join(' ');
                if (rel) a.setAttribute('rel', rel);
                else a.removeAttribute('rel');
            }
        }

        function patchAll() {
            if (patched) return;
            patched = true;
            document.querySelectorAll('a[href]').forEach(patchLink);
        }

        document.addEventListener('DOMContentLoaded', patchAll, { once: true });
        document.addEventListener('pointerdown', function (e) {
            var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
            patchLink(a);
        }, true);
        document.addEventListener('click', function (e) {
            var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
            patchLink(a);
        }, true);
    })();
    </script>

    <!-- ★ A1.5 公开访问 slug:早期标记 + 隐藏导航按钮 -->
    <script>
    (function () {
        try {
            var u = '';
            // 形式 1:/@<slug>(主推,2026-05-22)或 /u/<slug>(永久兼容)— 路径形式
            var pathMatch = (location.pathname || '').match(/^\/(?:@|u\/)([a-z0-9][a-z0-9_\-]{0,31})/i);
            if (pathMatch) u = pathMatch[1].toLowerCase();
            // 形式 2:?u=<slug>(兼容老链接,只在 path 未匹配时 fallback)
            if (!u) {
                var qMatch = (location.search || '').match(/[?&]u=([a-z0-9][a-z0-9_\-]{0,31})(?:&|$)/i);
                if (qMatch) u = qMatch[1].toLowerCase();
            }
            if (u) {
                document.documentElement.setAttribute('data-public-mode', u);
                document.addEventListener('DOMContentLoaded', function () {
                    // 2026-05-22:主题切换链接统一重写为 /@<slug>?theme=<key>(主推形式)
                    // 之前是 indexN.html?u=<slug>(query 形式),现在直接走 @ catch-all
                    var THEME_MAP = { 'index1.html':'nebula','index2.html':'notion','index3.html':'stripe','index4.html':'dark','index5.html':'mint' };
                    document.querySelectorAll('.style-opt[href]').forEach(function (a) {
                        var href = a.getAttribute('href') || '';
                        var key = THEME_MAP[href];
                        if (!key) return;
                        a.setAttribute('href', '/@' + encodeURIComponent(u) + '?theme=' + key);
                    });
                });
            }
        } catch (e) {}
    })();
    </script>

        #backHomeBtn {
            position: fixed;
            bottom: 33px;
            left: 10px;
            z-index: 10000;
            padding: 4px 10px;
            background-color: rgba(99, 91, 255, 0.2);
            color: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(99, 91, 255, 0.2);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', -apple-system, sans-serif;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
        }

        #backHomeBtn:hover {
            background-color: rgba(99, 91, 255, 0.35);
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 91, 255, 0.3);
            border-color: rgba(99, 91, 255, 0.4);
        }

        /* ================================================================
           风格切换下拉 — 页面滚动跟随版
           ================================================================ */
        .style-switcher {
            position: absolute;
            top: 28px;
            z-index: 10000;
            min-width: 108px;
        }

        .style-btn {
            width: 100%;
            background-color: rgba(73, 95, 139, 0.45);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid rgba(99, 91, 255, 0.2);
            color: rgba(255, 255, 255, 0.75);
            border-radius: 8px;
            padding: 7px 11px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            font-family: inherit;
        }

        .style-btn:hover {
            background-color: rgba(99, 91, 255, 0.35);
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 91, 255, 0.3);
            border-color: rgba(99, 91, 255, 0.4);
        }

        .style-caret {
            font-size: 10px;
            line-height: 1;
            transition: transform 0.22s ease;
            opacity: 0.85;
        }

        .style-btn.menu-open .style-caret {
            transform: rotate(180deg);
        }

        .style-menu {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: rgba(15, 40, 70, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 91, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: menuFadeIn 0.18s ease;
            border-radius: 8px;
        }

        @keyframes menuFadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .style-menu.menu-open {
            display: block;
        }

        .style-opt {
            display: block;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .style-opt:hover {
            background: rgba(99, 91, 255, 0.15);
            color: white;
        }

        .style-opt-active {
            background: rgba(99, 91, 255, 0.2);
            color: white;
            font-weight: 600;
            cursor: default;
        }

        .style-opt-active:hover {
            background: rgba(99, 91, 255, 0.2);
        }

        /* ================================================================
         * 交互增强
         * ================================================================ */

        a, button, [onclick], [role="option"],
        .link-card, .sub-card, .back-link, .expand-section-btn,
        .expand-zone, .email-tab, .style-btn, .style-opt,
        #backHomeBtn, .error-home-btn, .contact-desc,
        .email-contact-desc, .link-desc-clickable {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        .link-card,
        .sub-card,
        .back-link,
        .expand-section-btn,
        .style-btn,
        .style-opt,
        .error-home-btn {
            position: relative;
            overflow: hidden;
        }

        #backHomeBtn {
            overflow: hidden;
        }

        .card-container > .link-card {
            overflow: hidden;
        }

        .card-container {
            overflow: visible;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            background-color: #635BFF;
            opacity: 0.35;
        }

        @keyframes ripple-anim {
            to {
                transform: scale(2);
                opacity: 0;
            }
        }

        .back-link .ripple,
        .expand-section-btn .ripple,
        .style-btn .ripple,
        .email-tab .ripple,
        #backHomeBtn .ripple {
            background-color: #ffffff;
            opacity: 0.4;
        }

        .error-home-btn .ripple {
            background-color: #ffffff;
            opacity: 0.45;
        }

        .style-opt .ripple {
            background-color: #a5b4fc;
            opacity: 0.35;
        }

        /* 🔐 锁定按钮的波纹用白色（红底上白波纹） */
        .enc-lock-fab .ripple {
            background-color: #ffffff;
            opacity: 0.4;
        }

        .link-card,
        .sub-card,
        .back-link,
        .expand-section-btn,
        .style-btn,
        .style-opt,
        .email-tab,
        #backHomeBtn,
        .error-home-btn,
        .enc-lock-fab {
            -webkit-user-select: none;
            user-select: none;
        }

        .email-tab:active {
            filter: none !important;
            transition: none !important;
        }

        .link-card.email-card {
            transform: none;
            transition: transform .18s ease,
                        box-shadow .18s ease,
                        border-color .18s ease,
                        background .18s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .link-card.email-card:hover,
            .link-card.email-card:active,
            .link-card.email-card:hover:active,
            .link-card.email-card:focus {
                transform: translateY(-2px) !important;
            }
        }

        @media (hover: none) {
            .link-card.email-card,
            .link-card.email-card:active,
            .link-card.email-card:focus {
                transform: none !important;
            }
        }

        /* ★ contact-card-wrap：在外观上更接近邮箱卡片（右侧渐变 + 底边立体感），不影响功能 */
        .contact-card-wrap {
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid rgba(99, 91, 255, 0.5);
        }
        .contact-card-wrap::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 45%;
            background: linear-gradient(
                to left,
                rgba(99, 91, 255, 0.35) 0%,
                rgba(99, 91, 255, 0.12) 55%,
                rgba(99, 91, 255, 0) 100%
            );
            pointer-events: none;
            z-index: 0;
        }
        .contact-card-wrap > * {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
