    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 60px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 15px;
            transition: max-width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            padding-top: 0;
        }

        .title {
            color: white;
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 1px;
            transition: font-size 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .footer {
            text-align: center;
            margin-top: 1px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: errorFadeIn 0.6s ease-out;
        }

        @keyframes errorFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .error-emoji {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
            animation: errorBounce 2s ease-in-out infinite;
        }

        @keyframes errorBounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .error-title {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .error-message {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .error-hint-box {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 16px 18px;
            text-align: left;
            margin-bottom: 24px;
        }

        .error-hint-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .error-hint-item {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            line-height: 1.6;
            padding-left: 18px;
            position: relative;
            margin-bottom: 6px;
        }

        .error-hint-item:last-child {
            margin-bottom: 0;
        }

        .error-hint-item::before {
            content: '›';
            position: absolute;
            left: 4px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: bold;
        }

        .error-hint-item code {
            background: rgba(255, 255, 255, 0.15);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 12px;
        }

        .error-home-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .error-home-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .link-icon {
            display: inline-flex;
            width: 1.2em;
            height: 1.2em;
            vertical-align: -0.125em;
        }

        .link-icon img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .link-icon-svg {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .link-icon-svg svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .back-nav {
            display: flex;
            justify-content: center;
        }

        .back-link {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            text-decoration: none;
            border-radius: 18px;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            min-width: 120px;
            position: relative;
            overflow: hidden;
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .back-link:hover::before {
            left: 100%;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .section {
            margin-bottom: 30px;
            transition: margin-bottom 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .section.section-locked-pill {
            margin-bottom: 8px;
        }
        .section.section-locked-pill + .section.section-locked-pill {
            margin-top: -4px;
        }

        .section-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            transition: font-size 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                       margin-bottom 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .expand-section-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: white;
            border-radius: 18px;
            padding: 6px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            margin: 15px auto;
            width: 30%;
            min-width: 140px;
            height: 32px;
            opacity: 1;
            transform: translateY(0);
            position: relative;
            overflow: hidden;
        }

        .expand-section-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .expand-section-btn:hover::before {
            left: 100%;
        }

        .expand-section-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .expand-section-btn .arrow {
            font-size: 11px;
            transition: transform 0.3s ease;
        }

        .expand-section-btn.expanded .arrow {
            transform: rotate(180deg);
        }

        .expand-section-btn.moving {
            opacity: 0;
            transform: translateY(-20px);
        }

        #video-collapse-btn {
            margin-top: 8px;
            margin-bottom: 15px;
        }

        #ai-collapse-btn {
            margin-top: 8px;
            margin-bottom: 15px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            transition: gap 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            justify-content: center;
            width: 100%;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            transition: gap 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            justify-content: center;
            width: 100%;
            max-width: none;
            margin: 0 auto;
        }

        .hidden-cards {
            display: none;
            margin-top: 19px;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden-cards.expanded {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            opacity: 1;
            transform: translateY(0);
            transition: gap 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            justify-content: center;
        }

        .hidden-cards .link-card,
        .hidden-cards .card-container {
            opacity: 0;
            transform: translateY(-20px);
        }

        .hidden-cards .link-card:nth-child(1),
        .hidden-cards .card-container:nth-child(1),
        .hidden-cards .link-card:nth-child(2),
        .hidden-cards .card-container:nth-child(2) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.1s;
        }

        .hidden-cards .link-card:nth-child(3),
        .hidden-cards .card-container:nth-child(3),
        .hidden-cards .link-card:nth-child(4),
        .hidden-cards .card-container:nth-child(4) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.3s;
        }

        .hidden-cards .link-card:nth-child(5),
        .hidden-cards .card-container:nth-child(5),
        .hidden-cards .link-card:nth-child(6),
        .hidden-cards .card-container:nth-child(6) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.5s;
        }

        .hidden-cards .link-card:nth-child(7),
        .hidden-cards .card-container:nth-child(7),
        .hidden-cards .link-card:nth-child(8),
        .hidden-cards .card-container:nth-child(8) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.7s;
        }

        .hidden-cards .link-card:nth-child(9),
        .hidden-cards .card-container:nth-child(9),
        .hidden-cards .link-card:nth-child(10),
        .hidden-cards .card-container:nth-child(10) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 0.9s;
        }

        .hidden-cards .link-card:nth-child(11),
        .hidden-cards .card-container:nth-child(11),
        .hidden-cards .link-card:nth-child(12),
        .hidden-cards .card-container:nth-child(12) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.1s;
        }

        .hidden-cards .link-card:nth-child(13),
        .hidden-cards .card-container:nth-child(13),
        .hidden-cards .link-card:nth-child(14),
        .hidden-cards .card-container:nth-child(14) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.3s;
        }

        .hidden-cards .link-card:nth-child(15),
        .hidden-cards .card-container:nth-child(15),
        .hidden-cards .link-card:nth-child(16),
        .hidden-cards .card-container:nth-child(16) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.5s;
        }

        .hidden-cards .link-card:nth-child(17),
        .hidden-cards .card-container:nth-child(17),
        .hidden-cards .link-card:nth-child(18),
        .hidden-cards .card-container:nth-child(18) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.7s;
        }

        .hidden-cards .link-card:nth-child(19),
        .hidden-cards .card-container:nth-child(19),
        .hidden-cards .link-card:nth-child(20),
        .hidden-cards .card-container:nth-child(20) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 1.9s;
        }

        .hidden-cards .link-card:nth-child(n+21),
        .hidden-cards .card-container:nth-child(n+21) {
            animation: slideInDownRowWithHover 0.6s ease forwards;
            animation-delay: 2.1s;
        }

        @keyframes slideInDownRowWithHover {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden-cards.expanded.hover-ready .link-card {
            animation-name: none !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
        }

        .hidden-cards.expanded.hover-ready .card-container .link-card {
            animation-name: none !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
        }

        .hidden-cards.expanded.hover-ready .link-card:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15) !important;
            z-index: 2 !important;
        }

        .hidden-cards.expanded.hover-ready .card-container .link-card:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15) !important;
            z-index: 2 !important;
        }

        @keyframes slideInDownRow {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden-cards.collapsing .link-card,
        .hidden-cards.collapsing .card-container {
            animation: slideOutUpRow 0.4s ease forwards;
        }

        .hidden-cards.collapsing .link-card:nth-child(19),
        .hidden-cards.collapsing .card-container:nth-child(19),
        .hidden-cards.collapsing .link-card:nth-child(20),
        .hidden-cards.collapsing .card-container:nth-child(20) {
            animation-delay: 0s;
        }

        .hidden-cards.collapsing .link-card:nth-child(17),
        .hidden-cards.collapsing .card-container:nth-child(17),
        .hidden-cards.collapsing .link-card:nth-child(18),
        .hidden-cards.collapsing .card-container:nth-child(18) {
            animation-delay: 0.1s;
        }

        .hidden-cards.collapsing .link-card:nth-child(15),
        .hidden-cards.collapsing .card-container:nth-child(15),
        .hidden-cards.collapsing .link-card:nth-child(16),
        .hidden-cards.collapsing .card-container:nth-child(16) {
            animation-delay: 0.2s;
        }

        .hidden-cards.collapsing .link-card:nth-child(13),
        .hidden-cards.collapsing .card-container:nth-child(13),
        .hidden-cards.collapsing .link-card:nth-child(14),
        .hidden-cards.collapsing .card-container:nth-child(14) {
            animation-delay: 0.3s;
        }

        .hidden-cards.collapsing .link-card:nth-child(11),
        .hidden-cards.collapsing .card-container:nth-child(11),
        .hidden-cards.collapsing .link-card:nth-child(12),
        .hidden-cards.collapsing .card-container:nth-child(12) {
            animation-delay: 0.4s;
        }

        .hidden-cards.collapsing .link-card:nth-child(9),
        .hidden-cards.collapsing .card-container:nth-child(9),
        .hidden-cards.collapsing .link-card:nth-child(10),
        .hidden-cards.collapsing .card-container:nth-child(10) {
            animation-delay: 0.5s;
        }

        .hidden-cards.collapsing .link-card:nth-child(7),
        .hidden-cards.collapsing .card-container:nth-child(7),
        .hidden-cards.collapsing .link-card:nth-child(8),
        .hidden-cards.collapsing .card-container:nth-child(8) {
            animation-delay: 0.6s;
        }

        .hidden-cards.collapsing .link-card:nth-child(5),
        .hidden-cards.collapsing .card-container:nth-child(5),
        .hidden-cards.collapsing .link-card:nth-child(6),
        .hidden-cards.collapsing .card-container:nth-child(6) {
            animation-delay: 0.7s;
        }

        .hidden-cards.collapsing .link-card:nth-child(3),
        .hidden-cards.collapsing .card-container:nth-child(3),
        .hidden-cards.collapsing .link-card:nth-child(4),
        .hidden-cards.collapsing .card-container:nth-child(4) {
            animation-delay: 0.8s;
        }

        .hidden-cards.collapsing .link-card:nth-child(1),
        .hidden-cards.collapsing .card-container:nth-child(1),
        .hidden-cards.collapsing .link-card:nth-child(2),
        .hidden-cards.collapsing .card-container:nth-child(2) {
            animation-delay: 0.9s;
        }

        @keyframes slideOutUpRow {
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .card-container {
            position: relative;
            overflow: visible;
            z-index: 1;
        }

        .card-container.active {
            z-index: 20;
        }

        .card-container.active > .link-card,
        .card-container.active > .link-card:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15) !important;
        }

        .hidden-cards .card-container {
            z-index: 2;
        }

        .hidden-cards .card-container.active {
            z-index: 60;
        }

        .link-card {
            background: white;
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease,
                       padding 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                       border-radius 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            color: inherit;
            position: relative;
            cursor: pointer;
            overflow: visible;
            z-index: 1;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        .link-card-with-expand {
            padding-right: 55px;
        }

        .link-card-with-expand .expand-zone {
            position: absolute;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
            z-index: 2;
            transition: background 0.25s ease;
        }

        .link-card-with-expand .expand-zone:hover {
            background: rgba(102, 126, 234, 0.06);
        }

        .link-card-with-expand .expand-zone:active {
            background: rgba(102, 126, 234, 0.12);
        }

        .email-card {
            position: relative;
            padding: 16px;
            padding-right: 55%;
            overflow: hidden;
            border-bottom: 3px solid rgba(102, 126, 234, 0.6);
        }

        .email-main-content {
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }

        .email-main-content.slide-out {
            transform: translateX(-100%);
            opacity: 0;
        }

        .email-main-content.slide-in {
            transform: translateX(100%);
            opacity: 0;
        }

        .email-main-content.slide-in-active {
            transform: translateX(0);
            opacity: 1;
        }

        .email-tabs {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            display: flex;
            z-index: 1;
            width: 55%;
        }

        .email-tab {
            height: 100%;
            background: rgba(102, 126, 234, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 4px 2px;
            position: absolute;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: left center;
            border-radius: 0 10px 10px 0;
            white-space: nowrap;
        }

        .email-tab:not(.active) {

        @keyframes jellyDown {
            0%   { opacity: 0; transform: translateY(-6px); }
            55%  { opacity: 1; transform: translateY(0); }
            75%  { opacity: 1; transform: translateY(3.5px); }
            90%  { opacity: 1; transform: translateY(-1px); }
            100% { opacity: 1; transform: translateY(0); }

        @keyframes jellyUp {
            0%   { opacity: 0; transform: translateY(6px); }
            55%  { opacity: 1; transform: translateY(0); }
            75%  { opacity: 1; transform: translateY(-3.5px); }
            90%  { opacity: 1; transform: translateY(1px); }
            100% { opacity: 1; transform: translateY(0); }
