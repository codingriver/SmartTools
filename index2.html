    <meta name="referrer" content="origin">
    <script>
    (function () {
        var patched = false;

        function patchLink(a) {
            if (!a || !a.getAttribute) return;
            var href = a.getAttribute('href') || '';
            try {
                var u = new URL(href, location.href);
                if (u.protocol !== 'http:' && u.protocol !== 'https:') return;
            } catch (e) {
                return;
            }
            if (a.getAttribute('referrerpolicy') !== 'origin') {
                a.setAttribute('referrerpolicy', 'origin');
            }
            var rel = a.getAttribute('rel') || '';
            if (/\bnoreferrer\b/i.test(rel)) {
                rel = rel.split(/\s+/).filter(function (v) {
                    return v && v.toLowerCase() !== 'noreferrer';
                }).join(' ');
                if (rel) a.setAttribute('rel', rel);
                else a.removeAttribute('rel');
            }
        }

        function patchAll() {
            if (patched) return;
            patched = true;
            document.querySelectorAll('a[href]').forEach(patchLink);
        }

        document.addEventListener('DOMContentLoaded', patchAll, { once: true });
        document.addEventListener('pointerdown', function (e) {
            var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
            patchLink(a);
        }, true);
        document.addEventListener('click', function (e) {
            var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
            patchLink(a);
        }, true);
    })();
    </script>

    <!-- ★ A1.5 公开访问 slug:早期标记 + 隐藏导航按钮 -->
    <script>
    (function () {
        try {
            var u = '';
            // 形式 1:/@<slug>(主推,2026-05-22)或 /u/<slug>(永久兼容)— 路径形式
            var pathMatch = (location.pathname || '').match(/^\/(?:@|u\/)([a-z0-9][a-z0-9_\-]{0,31})/i);
            if (pathMatch) u = pathMatch[1].toLowerCase();
            // 形式 2:?u=<slug>(兼容老链接,只在 path 未匹配时 fallback)
            if (!u) {
                var qMatch = (location.search || '').match(/[?&]u=([a-z0-9][a-z0-9_\-]{0,31})(?:&|$)/i);
                if (qMatch) u = qMatch[1].toLowerCase();
            }
            if (u) {
                document.documentElement.setAttribute('data-public-mode', u);
                document.addEventListener('DOMContentLoaded', function () {
                    // 2026-05-22:主题切换链接统一重写为 /@<slug>?theme=<key>(主推形式)
                    // 之前是 indexN.html?u=<slug>(query 形式),现在直接走 @ catch-all
                    var THEME_MAP = { 'index1.html':'nebula','index2.html':'notion','index3.html':'stripe','index4.html':'dark','index5.html':'mint' };
                    document.querySelectorAll('.style-opt[href]').forEach(function (a) {
                        var href = a.getAttribute('href') || '';
                        var key = THEME_MAP[href];
                        if (!key) return;
                        a.setAttribute('href', '/@' + encodeURIComponent(u) + '?theme=' + key);
                    });
                });
            }
        } catch (e) {}
    })();
    </script>

            transition: font-size .4s cubic-bezier(.25,.46,.45,.94);

            backdrop-filter: blur(2px);

            border: 1px solid var(--bd);
            color: var(--tx2);
            border-radius: 8px;
            padding: 5px 12px 5px 11px;
            font-size: 12px; font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; gap: 5px;

            font-family: inherit;

            background: rgba(255, 255, 255, 0.45);
            border-color: var(--bd-hov);
            color: var(--tx1);
            box-shadow: var(--sh-md);

            transition: transform .2s ease;
            display: inline-block;
            opacity: .6;
        }

        .style-btn.menu-open .style-caret { transform: rotate(180deg); }

        .style-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            min-width: unset;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);

            pointer-events: none;
            overflow: hidden;

        .style-menu.menu-open {
            opacity: 1;

<!-- ★ A1.5 公开访问 slug:根据 data-public-mode 同步拼 ?u= 加载数据 -->
<script>
(function () {
    var u = document.documentElement.getAttribute('data-public-mode') || '';
    if (u) {
        document.write('<script src="/api/data?u=' + encodeURIComponent(u) + '"><\/script>');
    } else {
        document.write('<script src="/api/data"><\/script>');
    }
})();
</script>
<script>
// A1.5 增强 A:必须独立 <script> 块!
// 同一 inline <script> 内,document.write 注入的外部 src 要等本块结束后才会被解析加载,
// 所以这段判断必须放下一个 script 块,确保执行时 window.__publicSlugInfo 已就绪。
// 防御:除非明确 hit:true,否则一律撤销 data-public-mode(让 UI 回归正常 admin 视图)
// 覆盖场景:slug 失败 / 限速 429 / 网络异常 / __publicSlugInfo 未注入
//
// A1.5 增强 D(2026-05-23):info.oldSlug 存在 → 顶部插入"链接改名"banner,仅提示不动 URL
(function () {
    var info = window.__publicSlugInfo;
    if (!info || info.hit !== true) {
        document.documentElement.removeAttribute('data-public-mode');
        return;
    }
    if (!info.oldSlug || info.oldSlug === info.slug) return;

    var lang = (document.documentElement.lang || navigator.language || 'zh').toLowerCase();
    var isZh = lang.indexOf('en') !== 0;
    var msg = isZh
        ? '您访问的旧链接 /@' + info.oldSlug + ' 已改名为 /@' + info.slug + ',数据正常显示。'
        : 'The old link /@' + info.oldSlug + ' has been renamed to /@' + info.slug + '. Content loaded normally.';
    var closeLabel = isZh ? '我知道了' : 'Got it';

    function showBanner() {
        if (document.getElementById('__renameBanner')) return;
        var b = document.createElement('div');
        b.id = '__renameBanner';
        b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;' +
            'background:linear-gradient(90deg,#fff7e6 0%,#fffaf0 100%);' +
            'color:#7a5200;border-bottom:1px solid #f0c674;' +
            'padding:10px 16px;font-size:14px;line-height:1.5;' +
            'display:flex;align-items:center;justify-content:center;gap:16px;' +
            'box-shadow:0 2px 6px rgba(0,0,0,0.08);' +
            'font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';
        var text = document.createElement('span');
        text.textContent = '🔗 ' + msg;
        text.style.cssText = 'flex:1;text-align:center;max-width:900px;';
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = closeLabel;
        btn.style.cssText = 'background:#f0c674;color:#5c3d00;border:0;border-radius:4px;' +
            'padding:5px 14px;cursor:pointer;font-size:13px;font-weight:500;flex-shrink:0;';
        btn.onclick = function () { if (b.parentNode) b.parentNode.removeChild(b); };
        b.appendChild(text);
        b.appendChild(btn);
        document.body.appendChild(b);
    }

    if (document.body) {
        showBanner();
    } else {
        document.addEventListener('DOMContentLoaded', showBanner, { once: true });
    }
})();
</script>
