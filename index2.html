    <title>💖在线收藏夹</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' x='-0.11em' font-size='90'>😺🏷</text></svg>">

    <!-- 🔐 EncUnlock: 加密解锁模块样式 -->
    <link rel="stylesheet" href="shared/enc-unlock.css">

    <style>
        :root {
            --bg:              #FAFAF9;
            --bg-card:         #FFFFFF;
            --bg-card-hov:     #F7F6F3;
            --bg-sub:          #F7F6F3;
            --bg-sub-hov:      #EFEEEB;
            --bg-overlay:      rgba(55, 53, 47, 0.22);
            --bd:              #DDD9D3;
            --bd-hov:          #C2BEB6;
            --tx1:             #37352F;
            --tx2:             #787774;
            --tx3:             #BCBAB6;
            --ac:              #6E56CF;
            --ac-bg:           #F0ECFA;
            --ac-hov:          #5946B2;
            --sh-sm:  0 1px 3px rgba(55,53,47,.08),
                      0 2px 8px rgba(55,53,47,.07),
                      0 0 0 1px rgba(55,53,47,.05),
                      inset 0 1px 0 rgba(255,255,255,.95),
                      inset 0 -1px 0 rgba(55,53,47,.04);
            --sh-md:  0 3px 8px rgba(55,53,47,.10),
                      0 6px 20px rgba(55,53,47,.10),
                      0 0 0 1px rgba(55,53,47,.05),
                      inset 0 1px 0 rgba(255,255,255,.95),
                      inset 0 -1px 0 rgba(55,53,47,.05);
            --sh-lg:  0 8px 16px rgba(55,53,47,.12),
                      0 16px 40px rgba(55,53,47,.12),
                      0 0 0 1px rgba(55,53,47,.06);
            --sh-sub: 0 6px 16px rgba(55,53,47,.13),
                      0 2px 6px rgba(55,53,47,.08),
                      0 0 0 1px rgba(55,53,47,.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont,
                         "Segoe UI", "PingFang SC", "Hiragino Sans GB",
                         Helvetica, Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 24px 20px 72px;
            color: var(--tx1);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--ac) 0%, #C2B2EE 100%);
            z-index: 9999;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 10px;
            transition: max-width .4s cubic-bezier(.25,.46,.45,.94);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            padding-top: 0;
        }

        .title {
            color: var(--tx1);
            font-size: 26px; font-weight: 700;
            margin-bottom: 14px; letter-spacing: -.3px;
            transition: font-size .4s cubic-bezier(.25,.46,.45,.94);
        }

        .footer {
            text-align: center; margin-top: 6px;
            color: var(--tx3); font-size: 12px;
        }

        .style-switcher {
            position: fixed;
            top: 28px;
            right: 20px;
            z-index: 10000;
            min-width: unset;
        }

        .style-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid var(--bd);
            color: var(--tx2);
            border-radius: 8px;
            padding: 5px 12px 5px 11px;
            font-size: 12px; font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            box-shadow: var(--sh-sm);
            transition: all .18s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .style-btn:hover {
            background: rgba(255, 255, 255, 0.45);
            border-color: var(--bd-hov);
            color: var(--tx1);
            box-shadow: var(--sh-md);
        }

        .style-caret {
            font-size: 10px;
            transition: transform .2s ease;
            display: inline-block;
            opacity: .6;
        }

        .style-btn.menu-open .style-caret { transform: rotate(180deg); }

        .style-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            min-width: unset;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 4px;
            box-shadow: var(--sh-lg);
            z-index: 300;
            opacity: 0;
            transform: translateY(-8px) scale(.96);
            transform-origin: top right;
            transition: opacity .16s ease, transform .16s ease;
            pointer-events: none;
            overflow: hidden;
        }

        .style-menu.menu-open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .style-opt {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 9px;
            border-radius: 7px;
            font-size: 12px;
            color: var(--tx2);
            text-decoration: none;
            cursor: pointer;
            transition: all .12s ease;
            white-space: nowrap;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            overflow: hidden;
        }

        .style-opt:hover:not(.style-opt-active) {
            background: var(--bg-sub);
            color: var(--tx1);
        }

        .style-opt-active {
            color: var(--ac);
            font-weight: 700;
            background: var(--ac-bg);
            cursor: default;
        }

        .back-nav { display: flex; justify-content: center; }

        .back-link {
            background: var(--bg-card); border: 1px solid var(--bd);
            color: var(--tx2); text-decoration: none;
            border-radius: 8px; padding: 7px 16px;
            font-size: 13px; font-weight: 500;
            transition: all .18s ease; box-shadow: var(--sh-sm);
            text-align: center; min-width: 120px;
        }

        .back-link:hover {
            background: var(--bg-card-hov); border-color: var(--bd-hov);
            color: var(--tx1); box-shadow: var(--sh-md);
        }

        .section { margin-bottom: 28px; transition: margin-bottom .4s cubic-bezier(.25,.46,.45,.94); }

        /* ★ 锁定加密大类：只显示小药丸，不显示标题，行距紧凑 */
        .section.section-locked-pill {
            margin-bottom: 8px;
        }
        .section.section-locked-pill + .section.section-locked-pill {
            margin-top: -4px;
        }

        .section-title {
            color: var(--tx2); font-size: 11px; font-weight: 600;
            margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
            white-space: nowrap; letter-spacing: .04em;
            transition: color .25s ease, margin-bottom .4s cubic-bezier(.25,.46,.45,.94);
        }

        .section-title::after {
            content: ''; flex: 1; min-width: 10px; height: 1px;
            background: var(--bd);
        }

        .expand-section-btn {
            background: var(--bg-card); border: 1px solid var(--bd);
            color: var(--tx2); border-radius: 8px; padding: 5px 16px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 6px; font-size: 12px; font-weight: 500;
            transition: all .18s ease, opacity .3s ease, transform .3s ease;
            box-shadow: var(--sh-sm);
            margin: 12px auto; width: 30%; min-width: 130px; height: 30px;
            opacity: 1; transform: translateY(0); font-family: inherit;
        }

        .expand-section-btn:hover {
            background: var(--bg-card-hov); border-color: var(--bd-hov);
            color: var(--tx1); box-shadow: var(--sh-md);
        }

        .expand-section-btn .arrow { font-size: 10px; transition: transform .3s ease; }
        .expand-section-btn.expanded .arrow { transform: rotate(180deg); }
        .expand-section-btn.moving { opacity: 0; transform: translateY(-16px); }

        #video-collapse-btn { margin-top: 8px; margin-bottom: 12px; }
        #ai-collapse-btn    { margin-top: 8px; margin-bottom: 12px; }

        .links-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            transition: gap .4s cubic-bezier(.25,.46,.45,.94);
            justify-content: center; width: 100%;
        }

        .contact-row {
            display: grid; grid-template-columns: 1fr; gap: 10px;
            transition: gap .4s cubic-bezier(.25,.46,.45,.94);
            justify-content: center; width: 100%; max-width: none; margin: 0 auto;
        }

        .hidden-cards {
            display: none; margin-top: 16px; margin-bottom: 12px;
            opacity: 0; transform: translateY(-12px);
            transition: all .4s cubic-bezier(.175,.885,.32,1.275);
        }

        .hidden-cards.expanded {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; opacity: 1; transform: translateY(0);
            transition: gap .4s cubic-bezier(.25,.46,.45,.94);
            justify-content: center;
        }

        .hidden-cards .link-card,
        .hidden-cards .card-container { opacity: 0; transform: translateY(-20px); }

        .hidden-cards .link-card:nth-child(1),.hidden-cards .card-container:nth-child(1),
        .hidden-cards .link-card:nth-child(2),.hidden-cards .card-container:nth-child(2)
        { animation: slideInDown .6s ease forwards; animation-delay: .1s; }
        .hidden-cards .link-card:nth-child(3),.hidden-cards .card-container:nth-child(3),
        .hidden-cards .link-card:nth-child(4),.hidden-cards .card-container:nth-child(4)
        { animation: slideInDown .6s ease forwards; animation-delay: .3s; }
        .hidden-cards .link-card:nth-child(5),.hidden-cards .card-container:nth-child(5),
        .hidden-cards .link-card:nth-child(6),.hidden-cards .card-container:nth-child(6)
        { animation: slideInDown .6s ease forwards; animation-delay: .5s; }
        .hidden-cards .link-card:nth-child(7),.hidden-cards .card-container:nth-child(7),
        .hidden-cards .link-card:nth-child(8),.hidden-cards .card-container:nth-child(8)
        { animation: slideInDown .6s ease forwards; animation-delay: .7s; }
        .hidden-cards .link-card:nth-child(9),.hidden-cards .card-container:nth-child(9),
        .hidden-cards .link-card:nth-child(10),.hidden-cards .card-container:nth-child(10)
        { animation: slideInDown .6s ease forwards; animation-delay: .9s; }
        .hidden-cards .link-card:nth-child(n+11),.hidden-cards .card-container:nth-child(n+11)
        { animation: slideInDown .6s ease forwards; animation-delay: 1.1s; }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hidden-cards.expanded.hover-ready .link-card,
        .hidden-cards.expanded.hover-ready .card-container .link-card {
            animation-name: none !important; opacity: 1 !important;
            transform: translateY(0) !important;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease !important;
        }

        .hidden-cards.expanded.hover-ready .link-card:hover,
        .hidden-cards.expanded.hover-ready .card-container .link-card:hover {
            transform: translateY(-2px) !important;
            box-shadow: var(--sh-md) !important; z-index: 2 !important;
        }

        .hidden-cards.collapsing .link-card,
        .hidden-cards.collapsing .card-container { animation: slideOutUp .4s ease forwards; }

        .hidden-cards.collapsing .link-card:nth-child(9),.hidden-cards.collapsing .card-container:nth-child(9),
        .hidden-cards.collapsing .link-card:nth-child(10),.hidden-cards.collapsing .card-container:nth-child(10) { animation-delay: 0s; }
        .hidden-cards.collapsing .link-card:nth-child(7),.hidden-cards.collapsing .card-container:nth-child(7),
        .hidden-cards.collapsing .link-card:nth-child(8),.hidden-cards.collapsing .card-container:nth-child(8) { animation-delay: .1s; }
        .hidden-cards.collapsing .link-card:nth-child(5),.hidden-cards.collapsing .card-container:nth-child(5),
        .hidden-cards.collapsing .link-card:nth-child(6),.hidden-cards.collapsing .card-container:nth-child(6) { animation-delay: .2s; }
        .hidden-cards.collapsing .link-card:nth-child(3),.hidden-cards.collapsing .card-container:nth-child(3),
        .hidden-cards.collapsing .link-card:nth-child(4),.hidden-cards.collapsing .card-container:nth-child(4) { animation-delay: .3s; }
        .hidden-cards.collapsing .link-card:nth-child(1),.hidden-cards.collapsing .card-container:nth-child(1),
        .hidden-cards.collapsing .link-card:nth-child(2),.hidden-cards.collapsing .card-container:nth-child(2) { animation-delay: .4s; }

        @keyframes slideOutUp {
            to { opacity: 0; transform: translateY(-20px); }
        }

        .card-container { position: relative; overflow: visible; z-index: 1; }
        .card-container.active { z-index: 20; }
        .card-container.active > .link-card { border-color: var(--ac); box-shadow: var(--sh-md); }
        .hidden-cards .card-container { z-index: 2; }
        .hidden-cards .card-container.active { z-index: 60; }

        .link-card {
            background: var(--bg-card);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 14px;
            box-shadow: var(--sh-sm);
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease,
                        background .18s ease,
                        padding .4s cubic-bezier(.25,.46,.45,.94),
                        border-radius .4s cubic-bezier(.25,.46,.45,.94);
            text-decoration: none; color: inherit;
            position: relative; cursor: pointer;
            overflow: visible; z-index: 1;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--sh-md);
            border-color: var(--bd-hov);
            background: var(--bg-card-hov);
            z-index: 2;
        }

        .link-card-with-expand { padding-right: 52px; }

        .link-card-with-expand .expand-zone {
            position: absolute; top: 0; right: 0;
            width: 40%; height: 100%;
            border-radius: 0 10px 10px 0;
            cursor: pointer; z-index: 2;
            transition: background .18s ease;
        }

        .link-card-with-expand .expand-zone:hover  { background: rgba(110,86,207,.05); }
        .link-card-with-expand .expand-zone:active { background: rgba(110,86,207,.10); }

        .email-card {
            position: relative; padding: 14px;
            padding-right: 55%; overflow: hidden;
        }

        .email-main-content {
            position: relative; z-index: 2;
            transition: transform .4s cubic-bezier(.175,.885,.32,1.275), opacity .4s ease;
        }

        .email-main-content.slide-out { transform: translateX(-100%); opacity: 0; }
        .email-main-content.slide-in  { transform: translateX(100%);  opacity: 0; }
        .email-main-content.slide-in-active { transform: translateX(0); opacity: 1; }

        .email-tabs {
            position: absolute; top: 0; right: 0;
            height: 100%; display: flex; z-index: 1; width: 55%;
        }

        .email-tab {
            height: 100%; background: var(--bg-sub);
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 12px; color: var(--tx2); font-weight: 600;
            writing-mode: vertical-rl; text-orientation: mixed;
            padding: 4px 2px; position: absolute; overflow: hidden;
            transition: all .35s cubic-bezier(.175,.885,.32,1.275);
            transform-origin: left center;
            border-radius: 0 8px 8px 0; white-space: nowrap;
        }

        .email-tab:not(.active) {
            border-right: 2px solid var(--bd-hov);
            border-top: 1px solid var(--bd-hov);
            border-bottom: 2px solid var(--bd-hov);
            box-shadow: 1px 0 3px rgba(0,0,0,.07);
        }

        .email-tab.active {
            background: linear-gradient(to left, var(--bg-sub), rgba(247,246,243,0));
            color: var(--tx1);
            border-right: 3px solid var(--bd-hov);
            border-top: none; border-bottom: 2px solid var(--bd);
            font-weight: 700; border-radius: 0 12px 12px 0;
        }

        .email-tabs.active-0 .email-tab[data-email="0"] { right: 80%; width: 20%; z-index: 15; }
        .email-tabs.active-0 .email-tab[data-email="1"] { right: 60%; width: 20%; z-index: 13; }
        .email-tabs.active-0 .email-tab[data-email="2"] { right: 40%; width: 20%; z-index: 12; }
        .email-tabs.active-0 .email-tab[data-email="3"] { right: 20%; width: 20%; z-index: 11; }
        .email-tabs.active-0 .email-tab[data-email="4"] { right:  0%; width: 20%; z-index: 10; }

        .email-tabs.active-1 .email-tab[data-email="1"] { right: 80%; width: 20%; z-index: 15; }
        .email-tabs.active-1 .email-tab[data-email="0"] { right: 60%; width: 20%; z-index: 13; }
        .email-tabs.active-1 .email-tab[data-email="2"] { right: 40%; width: 20%; z-index: 12; }
        .email-tabs.active-1 .email-tab[data-email="3"] { right: 20%; width: 20%; z-index: 11; }
        .email-tabs.active-1 .email-tab[data-email="4"] { right:  0%; width: 20%; z-index: 10; }

        .email-tabs.active-2 .email-tab[data-email="2"] { right: 80%; width: 20%; z-index: 15; }
        .email-tabs.active-2 .email-tab[data-email="0"] { right: 60%; width: 20%; z-index: 13; }
        .email-tabs.active-2 .email-tab[data-email="1"] { right: 40%; width: 20%; z-index: 12; }
        .email-tabs.active-2 .email-tab[data-email="3"] { right: 20%; width: 20%; z-index: 11; }
        .email-tabs.active-2 .email-tab[data-email="4"] { right:  0%; width: 20%; z-index: 10; }

        .email-tabs.active-3 .email-tab[data-email="3"] { right: 80%; width: 20%; z-index: 15; }
        .email-tabs.active-3 .email-tab[data-email="0"] { right: 60%; width: 20%; z-index: 13; }
        .email-tabs.active-3 .email-tab[data-email="1"] { right: 40%; width: 20%; z-index: 12; }
        .email-tabs.active-3 .email-tab[data-email="2"] { right: 20%; width: 20%; z-index: 11; }
        .email-tabs.active-3 .email-tab[data-email="4"] { right:  0%; width: 20%; z-index: 10; }

        .email-tabs.active-4 .email-tab[data-email="4"] { right: 80%; width: 20%; z-index: 15; }
        .email-tabs.active-4 .email-tab[data-email="0"] { right: 60%; width: 20%; z-index: 13; }
        .email-tabs.active-4 .email-tab[data-email="1"] { right: 40%; width: 20%; z-index: 12; }
        .email-tabs.active-4 .email-tab[data-email="2"] { right: 20%; width: 20%; z-index: 11; }
        .email-tabs.active-4 .email-tab[data-email="3"] { right:  0%; width: 20%; z-index: 10; }

        .email-tab:hover:not(.active) { background: var(--bg-sub-hov); opacity: .8; transform: translateX(-2px); }

        .expand-btn {
            position: absolute; right: 18px; top: 50%;
            transform: translateY(-50%);
            background: transparent; 
            border: 1px dashed #A898DA;
            border-radius: 6px;
            width: 25px; height: 17px;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all .2s ease;
            z-index: 3; pointer-events: none;
        }

        .expand-btn::after {
            content: '';
            display: block;
            width: 8px; height: 8px;
            border-bottom: 1px dashed #9282BE;
            border-right: 1px dashed #9282BE;
            transform: rotate(45deg);
            margin-top: -5px;
        }

        .expand-btn.expanded {
            background: transparent;
            border-color: #B2A2DE;
            transform: translateY(-50%) rotate(180deg);
        }

        .link-card-with-expand:hover .expand-btn {
            border: 1px solid #B2A2DE;
        }

        .link-card-with-expand:hover .expand-btn::after {
            border-bottom: 1px dashed #A292CE;
            border-right: 1px dashed #A292CE;
        }

        .link-card-with-expand .expand-zone:hover ~ .expand-btn::after {
            border-bottom: 1.5px solid #A292CE;
            border-right: 1.5px solid #A292CE;
        }

        .sub-cards {
            position: absolute; top: 85%;
            left: 2.5%; right: 2.5%;
            z-index: 30; margin-top: -8px;
            opacity: 0; visibility: hidden;
            transform: translateY(-8px) scaleY(.5);
            transform-origin: top center;
            transition: opacity .18s cubic-bezier(.24,1.39,.64,1),
                        visibility .18s cubic-bezier(.24,1.39,.64,1),
                        transform .18s cubic-bezier(.24,1.39,.64,1);
            padding: 6px;
            background: var(--bg-card);
            border: 1px solid var(--bd);
            border-radius: 10px;
            box-shadow: var(--sh-sub);
        }

        .hidden-cards .sub-cards { z-index: 70; }
        .sub-cards.expanded { opacity: 1; visibility: visible; transform: translateY(0); }

        .sub-card {
            background: var(--bg-sub);
            border: 1px solid var(--bd);
            border-radius: 7px;
            padding: 9px 12px; margin-bottom: 4px;
            box-shadow: 0 1px 3px rgba(55,53,47,.06),
                        inset 0 1px 0 rgba(255,255,255,.7);
            transition: transform .15s ease, box-shadow .15s ease,
                        background .15s ease, border-color .15s ease;
            cursor: pointer; opacity: 0;
            transform: translateX(-12px);
            position: relative; z-index: 1;
        }

        @keyframes jellyDown {
            0%   { opacity: 0; transform: translateY(-6px); }
            55%  { opacity: 1; transform: translateY(0); }
            75%  { opacity: 1; transform: translateY(3px); }
            90%  { opacity: 1; transform: translateY(-1px); }
            100% { opacity: 1; transform: translateY(0); }

                return '<a href="' + card.url + '" target="_blank" class="link-card">' +
                    renderIcon(card) +
                    '<h3 class="link-title">' + card.title + '</h3>' +
                    '<p class="link-desc">' + (card.desc || '') + '</p></a>';
            }
            if (card.type === 'desc-clickable') {
                return '<div class="link-card" onclick="window.open(\'' + card.url + '\', \'_blank\')">' +
                    renderIcon(card) +
                    '<h3 class="link-title">' + card.title + '</h3>' +
                    '<p class="link-desc-clickable" onclick="event.stopPropagation(); window.open(\'' + card.descUrl + '\', \'_blank\')">' + card.descClickable + '</p></div>';
            }
            if (card.type === 'expandable') {
                var descHTML = '';
                if (card.descClickable) {
                    descHTML = '<p class="link-desc-clickable" onclick="event.stopPropagation(); window.open(\'' + card.descUrl + '\', \'_blank\')">' + card.descClickable + '</p>';
                } else if (card.desc) {
                    descHTML = '<p class="link-desc">' + card.desc + '</p>';
                }
                var subHTML = '';
                card.subCards.forEach(function(sc) { subHTML += generateSubCardHTML(sc); });
                return '<div class="card-container">' +
                    '<div class="link-card link-card-with-expand" onclick="handleCardClick(event, \'' + card.url + '\', \'' + card.id + '-subcards\')">' +
                    renderIcon(card) +
                    '<h3 class="link-title">' + card.title + '</h3>' +
                    descHTML +
                    '<div class="expand-zone" onclick="event.stopPropagation(); handleExpandZone(\'' + card.id + '-subcards\', this)"></div>' +
                    '<button class="expand-btn" title="展开更多"></button></div>' +
                    '<div class="sub-cards" id="' + card.id + '-subcards">' + subHTML + '</div></div>';
            }
            return '';
        }

        function generateSubCardHTML(sc) {
            var iconHTML = renderIcon(sc);
            var onclick = sc.isLocal
                ? 'window.location.href=\'' + sc.url + '\''
                : 'window.open(\'' + sc.url + '\', \'_blank\')';
            if (sc.content !== undefined) {
                return '<div class="sub-card compact-card" onclick="' + onclick + '">' +
                    iconHTML +
                    '<div class="link-content"><span class="link-url">' + sc.content + '</span>' +
                    (sc.note ? '<span class="link-note">' + sc.note + '</span>' : '') +
                    '</div></div>';
            }
            return '<div class="sub-card two-line-card" onclick="' + onclick + '">' +
                '<div class="card-header">' + iconHTML +
                '<h3 class="link-title">' + sc.title + '</h3></div>' +
                '<p class="link-url">' + (sc.desc || '') + '</p></div>';
        }

        function generateStaticGrid(data) {
            var html = '<div class="links-grid">';
            data.forEach(function(card) { html += generateCardHTML(card); });
            return html + '</div>';
        }

        function getVisibleCount(prefix, layout) {
            if (prefix === 'video') {
                return layout === 'mobile' ? 4 : layout === 'tablet' ? 6 : 8;
            }
            if (prefix === 'ai') {
                return layout === 'tablet' ? 3 : 4;
            }
            if (typeof prefix === 'string' && prefix.indexOf('custom_') === 0) {
                return layout === 'mobile' ? 4 : layout === 'tablet' ? 6 : 8;
            }
            return 999;
        }

        function generateDynamicGrid(prefix, data, layout) {
            var count   = getVisibleCount(prefix, layout);
            var visible = data.slice(0, count);
            var hidden  = data.slice(count);

            var html = '<div class="links-grid">';
            visible.forEach(function(card) { html += generateCardHTML(card); });
            html += '</div>';

            if (hidden.length > 0) {
                html += '<button class="expand-section-btn" onclick="toggleSection(\'' + prefix + '\')" id="' + prefix + '-expand-btn">' +
                    '<span>展开卡片</span><span class="arrow">▼</span></button>';
                html += '<div class="hidden-cards" id="' + prefix + '-hidden-cards">';
                hidden.forEach(function(card) { html += generateCardHTML(card); });
                html += '</div>';
                html += '<button class="expand-section-btn" onclick="toggleSection(\'' + prefix + '\')" id="' + prefix + '-collapse-btn" style="display:none;">' +
                    '<span>折叠卡片</span><span class="arrow">▲</span></button>';
            }
            return html;
        }

        function generateEmailCardHTML() {
            var tabsHTML = '';
            emailData.forEach(function(em, i) {
                var cls = i === 0 ? ' active' : '';
                tabsHTML += '<div class="email-tab' + cls + '" onclick="event.stopPropagation(); switchEmail(' + i + ')" data-email="' + i + '">' + (i + 1) + '</div>';
            });
            return '<div class="card-container">' +
                '<div class="link-card email-card" onclick="openEmail(currentEmailData.url)">' +
                '<div class="email-main-content" id="email-main-content">' +
                '<div class="email-contact-header">' +
                renderIcon(emailData[0], 'id="email-icon"') +
                '<h3 class="link-title" id="email-title">' + emailData[0].title + '</h3>' +
                '</div>' +
                '<p class="email-contact-desc" id="email-address" onclick="event.stopPropagation(); window.open(currentEmailData.mailto, \'_blank\')">' + emailData[0].address + '</p>' +
                '</div>' +
                '<div class="email-tabs active-0" id="email-tabs">' + tabsHTML + '</div>' +
                '</div></div>';
        }

        function generateContactCardHTML(card) {
            return '<div class="link-card contact-card-wrap" onclick="window.open(\'' + card.url + '\', \'_blank\')">' +
                '<div class="contact-header">' + renderIcon(card) +
                '<h3 class="link-title">' + card.title + '</h3></div>' +
                '<p class="contact-desc" onclick="event.stopPropagation(); window.open(\'' + card.descUrl + '\', \'_blank\')">' + card.desc + '</p></div>';
        }

        function generateContactGrid() {
            var html = '<div class="links-grid contact-row">';
            html += generateEmailCardHTML();
            contactData.forEach(function(card) { html += generateContactCardHTML(card); });
            return html + '</div>';
        }

        function handleCardClick(event, url, subcardId) {
            var card   = event.currentTarget;
            var rect   = card.getBoundingClientRect();
            var clickX = event.clientX - rect.left;
            if (clickX > rect.width * 3 / 5) {
                var btn = card.querySelector('.expand-btn');
                if (btn) toggleSubCards(subcardId, btn);
            } else {
                window.open(url, '_blank');
            }
        }

        function handleExpandZone(subcardId, zone) {
            var btn = zone.closest('.link-card').querySelector('.expand-btn');
            if (btn) toggleSubCards(subcardId, btn);
        }

        function toggleSubCards(subcardId, button) {
            var subcards      = document.getElementById(subcardId);
            var overlay       = document.getElementById('overlay');
            var cardContainer = button.closest('.card-container');
            var isExpanded    = subcards.classList.contains('expanded');

            if (currentExpanded && currentExpanded !== subcardId) {
                var otherSubcards = document.getElementById(currentExpanded);
                if (otherSubcards) {
                    var otherButton    = otherSubcards.parentElement.querySelector('.expand-btn');
                    var otherContainer = otherButton.closest('.card-container');
                    otherSubcards.classList.remove('expanded');
                    otherButton.classList.remove('expanded');
                    otherContainer.classList.remove('active');
                }
            }

            if (isExpanded) {
                subcards.classList.remove('expanded');
                button.classList.remove('expanded');
                cardContainer.classList.remove('active');
                overlay.classList.remove('active');
                currentExpanded = null;
            } else {
                subcards.classList.add('expanded');
                button.classList.add('expanded');
                cardContainer.classList.add('active');
                overlay.classList.add('active');
                currentExpanded = subcardId;
            }
        }

        function toggleSection(prefix) {
            var section     = document.getElementById(prefix + '-hidden-cards');
            var expandBtn   = document.getElementById(prefix + '-expand-btn');
            var collapseBtn = document.getElementById(prefix + '-collapse-btn');
            var isExpanded  = section.classList.contains('expanded');

            if (isExpanded) {
                section.classList.remove('hover-ready');
                section.classList.add('collapsing');
                collapseBtn.classList.add('moving');
                setTimeout(function() {
                    section.classList.remove('expanded', 'collapsing');
                    collapseBtn.style.display = 'none';
                    collapseBtn.classList.remove('moving');
                    setTimeout(function() {
                        expandBtn.style.display = 'flex';
                        expandBtn.classList.remove('moving');
                    }, 100);
                }, 600);
            } else {
                expandBtn.classList.add('moving');
                setTimeout(function() {
                    expandBtn.style.display = 'none';
                    section.classList.add('expanded');
                    setTimeout(function() { section.classList.add('hover-ready'); }, 2500);
                    setTimeout(function() {
                        collapseBtn.style.display = 'flex';
                        collapseBtn.classList.remove('moving');
                    }, 400);
                }, 200);
            }
        }

        function autoExpandSection(prefix) {
            var section     = document.getElementById(prefix + '-hidden-cards');
            var expandBtn   = document.getElementById(prefix + '-expand-btn');
            var collapseBtn = document.getElementById(prefix + '-collapse-btn');
            if (!section || !expandBtn) return;
            expandBtn.style.display = 'none';
            section.classList.add('expanded', 'hover-ready');
            if (collapseBtn) collapseBtn.style.display = 'flex';
        }

        function switchEmail(index) {
            if (isAnimating) return;
            var currentIndex = emailData.indexOf(currentEmailData);
            if (currentIndex === index) return;

            isAnimating = true;
            var mainContent = document.getElementById('email-main-content');
            mainContent.classList.add('slide-out');

            setTimeout(function() {
                currentEmailData = emailData[index];

                var emailIconEl = document.getElementById('email-icon');
                if (currentEmailData.iconImg) {
                    emailIconEl.innerHTML = '<img src="' + currentEmailData.iconImg + '" alt="" />';
                    emailIconEl.className = 'link-icon';
                } else if (currentEmailData.icon && currentEmailData.icon.charAt(0) === '<') {
                    emailIconEl.innerHTML = currentEmailData.icon;
                    emailIconEl.className = 'link-icon link-icon-svg';
                } else {
                    emailIconEl.innerHTML = currentEmailData.icon || '';
                    emailIconEl.className = 'link-icon';
                }

                document.getElementById('email-title').textContent   = currentEmailData.title;
                document.getElementById('email-address').textContent = currentEmailData.address;

                var addressEl = document.getElementById('email-address');
                addressEl.onclick = function(event) {
                    event.stopPropagation();
                    window.open(currentEmailData.mailto, '_blank');
                };

                mainContent.classList.remove('slide-out');
                mainContent.classList.add('slide-in');

                setTimeout(function() {
                    mainContent.classList.remove('slide-in');
                    mainContent.classList.add('slide-in-active');
                    setTimeout(function() {
                        mainContent.classList.remove('slide-in-active');
                        isAnimating = false;
                    }, 400);
                }, 50);
            }, 200);

            document.querySelectorAll('.email-tab').forEach(function(tab, i) {
                if (i === index) tab.classList.add('active');
                else tab.classList.remove('active');
            });
            document.getElementById('email-tabs').className = 'email-tabs active-' + index;
        }

        function openEmail(url) { window.open(url, '_blank'); }

        // ================================================================
        // ★ 自定义大类：从 data.js 的 customSections 注入到 DOM
        //   锁定的加密大类：仅渲染小药丸，不渲染 <h2> 标题（隐私保护）
        // ================================================================
        function injectCustomSections(layout) {
            if (typeof customSections === 'undefined' || !Array.isArray(customSections) || !customSections.length) return;

            var contactTitle = document.getElementById('contact');
            if (!contactTitle) return;
            var contactSection = contactTitle.closest('.section');
            if (!contactSection) return;

            customSections.forEach(function(cs) {
                if (!cs || !cs.key || typeof cs.key !== 'string') return;
                if (document.getElementById(cs.key + '-content')) return;

                var sectionEl = document.createElement('div');
                sectionEl.className = 'section';
                sectionEl.dataset.customKey = cs.key;

                // 🔐 锁定状态：不渲染标题，只留小药丸占位
                if (window.EncUnlock && EncUnlock.isLocked(cs)) {
                    sectionEl.classList.add('section-locked-pill');
                    sectionEl.innerHTML = '<div id="' + cs.key + '-content"></div>';
                } else {
                    sectionEl.innerHTML =
                        '<h2 class="section-title" id="' + cs.key + '">' + (cs.label || cs.key) + '</h2>' +
                        '<div id="' + cs.key + '-content"></div>';
                }
                contactSection.parentNode.insertBefore(sectionEl, contactSection);

                renderCustomSection(cs, layout);
            });
        }

        function renderCustomSection(cs, layout) {
            var contentEl = document.getElementById(cs.key + '-content');
            if (!contentEl) return;

            // 🔐 加密大类未解锁 → 渲染小药丸占位
            if (window.EncUnlock && EncUnlock.isLocked(cs)) {
                contentEl.innerHTML = '';
                contentEl.appendChild(EncUnlock.makeLockedPlaceholder(cs));
                return;
            }

            var cards = Array.isArray(cs.cards) ? cs.cards : [];
            if (!cards.length) {
                contentEl.innerHTML = '';
                return;
            }
            if (cs.dynamic) {
                contentEl.innerHTML = generateDynamicGrid(cs.key, cards, layout);
                if (layout === 'desktop') {
                    autoExpandSection(cs.key);
                }
            } else {
                contentEl.innerHTML = generateStaticGrid(cards);
            }
        }

        function toggleStyleMenu(e) {
            e.stopPropagation();
            var menu = document.getElementById('styleMenu');
            var btn  = document.getElementById('styleBtn');
            var isOpen = menu.classList.contains('menu-open');
            if (isOpen) {
                menu.classList.remove('menu-open');
                btn.classList.remove('menu-open');
                btn.setAttribute('aria-expanded', 'false');
            } else {
                menu.classList.add('menu-open');
                btn.classList.add('menu-open');
                btn.setAttribute('aria-expanded', 'true');
            }
        }

        // ================================================================
        // 初始化（async 以便等待 EncUnlock bootstrap）
        // ================================================================
        document.addEventListener('DOMContentLoaded', async function() {

            document.addEventListener('click', function(e) {
                if (!e.target.closest('#styleSwitcher')) {
                    var menu = document.getElementById('styleMenu');
                    var btn  = document.getElementById('styleBtn');
                    if (menu && menu.classList.contains('menu-open')) {
                        menu.classList.remove('menu-open');
                        btn.classList.remove('menu-open');
                        btn.setAttribute('aria-expanded', 'false');
                    }
                }
            });

            currentLayout = detectLayout();

            // 🔐 EncUnlock: 启动时尝试用 sessionStorage 里的密码自动解锁
            if (window.EncUnlock) {
                try { await EncUnlock.bootstrap(); } catch (e) { console.warn('EncUnlock bootstrap error:', e); }
            }

            document.getElementById('usb-drive-content').innerHTML  = generateStaticGrid(usbDriveData);
            document.getElementById('teaching-content').innerHTML    = generateStaticGrid(teachingData);

            injectCustomSections(currentLayout);

            document.getElementById('contact-content').innerHTML     = generateContactGrid();
            document.getElementById('online-ai-content').innerHTML   = generateDynamicGrid('ai',    onlineAIData, currentLayout);
            document.getElementById('video-content').innerHTML       = generateDynamicGrid('video', videoData,    currentLayout);

            if (currentLayout === 'desktop') {
                autoExpandSection('ai');
                autoExpandSection('video');
            }

            alignStyleSwitcher();

            var containerEl = document.querySelector('.container');
            if (typeof ResizeObserver !== 'undefined' && containerEl) {
                new ResizeObserver(function() {
                    alignStyleSwitcher();
                }).observe(containerEl);
            }

            // 🔐 EncUnlock: 只要有已解锁的加密大类，就挂载浮动"立即锁定"按钮
            if (window.EncUnlock && EncUnlock.mountLockButton) {
                EncUnlock.mountLockButton();
            }
        });

        window.addEventListener('resize', function() {
            var newLayout = detectLayout();
            if (newLayout !== currentLayout) {
                currentLayout = newLayout;
                if (currentExpanded) {
                    currentExpanded = null;
                    document.getElementById('overlay').classList.remove('active');
                }
                document.getElementById('online-ai-content').innerHTML = generateDynamicGrid('ai',    onlineAIData, currentLayout);
                document.getElementById('video-content').innerHTML     = generateDynamicGrid('video', videoData,    currentLayout);
                if (currentLayout === 'desktop') {
                    autoExpandSection('ai');
                    autoExpandSection('video');
                }

                if (typeof customSections !== 'undefined' && Array.isArray(customSections)) {
                    customSections.forEach(function(cs) {
                        if (cs && cs.key) renderCustomSection(cs, currentLayout);
                    });
                }
            }

            requestAnimationFrame(alignStyleSwitcher);
        });

        document.getElementById('overlay').addEventListener('click', function() {
            if (currentExpanded) {
                var subcards = document.getElementById(currentExpanded);
                if (subcards) {
                    var button        = subcards.parentElement.querySelector('.expand-btn');
                    var cardContainer = button.closest('.card-container');
                    subcards.classList.remove('expanded');
                    button.classList.remove('expanded');
                    cardContainer.classList.remove('active');
                }
                currentExpanded = null;
            }
            this.classList.remove('active');
        });

(function initRipple() {
    var rippleSelector = [
        '.link-card',
        '.sub-card',
        '.back-link',
        '.expand-section-btn',
        '.style-btn',
        '.style-opt',
        '.email-tab',
        '#backHomeBtn',
        '.error-home-btn',
        '.enc-lock-fab'
    ].join(',');

    function createRipple(e, target) {
        if (target.classList.contains('style-opt-active')) return;

        var rect = target.getBoundingClientRect();
        var point = e.touches && e.touches[0] ? e.touches[0] : e;
        var x = point.clientX - rect.left;
        var y = point.clientY - rect.top;
        var size = Math.max(rect.width, rect.height) * 2;

        var ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.left = (x - size / 2) + 'px';
        ripple.style.top  = (y - size / 2) + 'px';

        target.appendChild(ripple);

        setTimeout(function() {
            if (ripple && ripple.parentNode) {
                ripple.parentNode.removeChild(ripple);
            }
        }, 850);
    }

    var supportsPointer = 'PointerEvent' in window;
    var eventName = supportsPointer ? 'pointerdown' : 'mousedown';

    document.addEventListener(eventName, function(e) {
        var target = e.target.closest(rippleSelector);
        if (!target) return;
        createRipple(e, target);
    }, { passive: true });

    if (!supportsPointer) {
        document.addEventListener('touchstart', function(e) {
            var target = e.target.closest(rippleSelector);
            if (!target) return;
            createRipple(e, target);
        }, { passive: true });
    }
})();       
    </script>
